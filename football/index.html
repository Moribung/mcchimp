<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anstoss</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --surface: #14141a;
    --surface2: #1e1e28;
    --surface3: #252532;
    --border: #2a2a38;
    --gold: #d4a847;
    --gold-dim: #8a6c29;
    --green: #3ecf6a;
    --green-dim: #1a5c30;
    --red: #e05252;
    --red-dim: #5c2020;
    --amber: #e8994a;
    --amber-dim: #6b461f;
    --purple: #a855f7;
    --purple-dim: #4c1d95;
    --text: #e8e8e0;
    --text-dim: #9090a0;
    --muted: #6b6b7a;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Typography ── */
  .font-display { font-family: var(--font-display); }
  .text-gold { color: var(--gold); }
  .text-green { color: var(--green); }
  .text-red { color: var(--red); }
  .text-amber { color: var(--amber); }
  .text-muted { color: var(--muted); }
  .text-dim { color: var(--text-dim); }
  .tabular { font-variant-numeric: tabular-nums; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 20px;
    border: none;
    border-radius: 3px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .option-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .hub-tab:focus-visible { outline: 2px solid var(--gold); outline-offset: -2px; }
  .kit-swatch:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  .btn-primary {
    background: var(--gold);
    color: #0a0a0c;
  }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-danger {
    background: var(--red-dim);
    color: var(--red);
    border: 1px solid var(--red-dim);
  }
  .btn-lg {
    padding: 14px 32px;
    font-size: 15px;
    letter-spacing: 0.1em;
  }
  .btn-sm {
    padding: 6px 12px;
    font-size: 12px;
  }
  .btn-full { width: 100%; }

  /* ── Inputs ── */
  input[type="text"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 10px 14px;
    width: 100%;
    transition: border-color 0.15s;
    outline: none;
  }
  input[type="text"]:focus { border-color: var(--gold); }
  input[type="text"]::placeholder { color: var(--muted); }

  input[type="number"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 8px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="number"]:focus { border-color: var(--gold); }
  input[type="range"] { width: 100%; accent-color: var(--gold); margin-top: 6px; cursor: pointer; }
  .field-note { font-size: 11px; color: var(--amber); margin-top: 4px; }
  .toggle-row { display: flex; align-items: center; gap: 12px; }
  .toggle-switch { position: relative; display: inline-block; width: 42px; height: 22px; flex-shrink: 0; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-knob {
    position: absolute; inset: 0;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 22px; cursor: pointer; transition: background 0.2s, border-color 0.2s;
  }
  .toggle-knob::before {
    content: ''; position: absolute;
    width: 16px; height: 16px; left: 2px; bottom: 2px;
    background: var(--muted); border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle-switch input:checked + .toggle-knob { background: color-mix(in srgb, var(--gold) 20%, transparent); border-color: var(--gold); }
  .toggle-switch input:checked + .toggle-knob::before { transform: translateX(20px); background: var(--gold); }
  .rating-val { font-family: var(--font-display); font-size: 22px; color: var(--gold); min-width: 28px; text-align: right; }

  /* ── Cards / Surfaces ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
  }
  .card-tight { padding: 12px 16px; }
  .card-flush { padding: 0; overflow: hidden; }

  /* ── Section labels ── */
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* ── Dividers ── */
  hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  /* ══════════════════════════════════════════
     START SCREEN
  ══════════════════════════════════════════ */
  .start-screen {
    max-width: 560px;
    margin: 0 auto;
    padding: 60px 24px 40px;
    width: 100%;
  }

  .start-header {
    margin-bottom: 48px;
    text-align: center;
  }
  .start-header h1 {
    font-family: var(--font-display);
    font-size: 96px;
    line-height: 0.9;
    color: var(--gold);
    letter-spacing: 0.02em;
  }
  .start-header p {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .continue-block {
    margin-bottom: 32px;
  }
  .continue-block .card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .continue-meta { font-size: 12px; color: var(--text-dim); }
  .continue-meta strong { color: var(--text); display: block; margin-bottom: 2px; }

  .divider-or {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .divider-or::before, .divider-or::after {
    content: '';
    flex: 1;
    border-top: 1px solid var(--border);
  }

  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .input-row {
    display: flex;
    gap: 8px;
  }
  .input-row input { flex: 1; }

  .kit-picker {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .kit-swatch {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
  }
  .kit-swatch:hover { transform: scale(1.1); }
  .kit-swatch.selected {
    border-color: var(--text);
    transform: scale(1.1);
  }
  .kit-swatch.selected::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: rgba(255,255,255,0.85);
    font-weight: bold;
  }

  .qset-card {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    background: var(--surface2);
  }
  .qset-card:hover { border-color: var(--gold-dim); }
  .qset-card.selected { border-color: var(--gold); background: color-mix(in srgb, var(--gold) 8%, var(--surface2)); }
  .qset-card-icon { font-size: 22px; margin-bottom: 6px; }
  .qset-card-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .qset-card-desc { font-size: 11px; color: var(--text-dim); line-height: 1.4; }

  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: 4px;
    padding: 16px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
    position: relative;
  }
  .upload-zone:hover { border-color: var(--gold-dim); }
  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .upload-zone-icon { font-size: 20px; margin-bottom: 4px; }
  .upload-msg { margin-top: 6px; font-size: 11px; color: var(--gold); }

  /* ══════════════════════════════════════════
     HUB
  ══════════════════════════════════════════ */
  .hub-layout {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  .hub-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .hub-title {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 0.04em;
  }
  .hub-meta {
    font-size: 12px;
    color: var(--text-dim);
    text-align: right;
  }
  .hub-meta strong { color: var(--text); }

  .hub-tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .hub-tab {
    padding: 10px 18px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    border: none;
    border-bottom: 2px solid transparent;
    background: none;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    margin-bottom: -1px;
  }
  .hub-tab:hover { color: var(--text); }
  .hub-tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  .hub-body {
    flex: 1;
    padding: 24px;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
  }

  .hub-footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 12px;
    position: sticky;
    bottom: 0;
  }

  /* ── League Table ── */
  .league-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .league-table th {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .league-table th.num { text-align: right; }
  .league-table td {
    padding: 9px 10px;
    border-bottom: 1px solid var(--surface2);
    font-variant-numeric: tabular-nums;
  }
  .league-table td.num { text-align: right; color: var(--text-dim); }
  .league-table tr:last-child td { border-bottom: none; }
  .league-table .pos { color: var(--muted); width: 28px; }
  .league-table .club-name { font-weight: 500; }
  .league-table tr.player-row td { color: var(--gold); background: #3a1a00; }
  .league-table tr.player-row .club-name { color: var(--gold); font-weight: 600; }
  .league-table tr.relegation-zone td { border-top: 1px solid var(--red-dim); }
  .league-table tr.promotion-zone td { border-top: 1px solid var(--green-dim); }
  .league-table .pts { color: var(--text); font-weight: 600; }
  .league-table .gd-pos { color: var(--green); }
  .league-table .gd-neg { color: var(--red); }

  /* ── Fixtures ── */
  .matchday-block { margin-bottom: 20px; }
  .matchday-heading {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 6px 0;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .matchday-heading.current { color: var(--gold); }
  .matchday-heading::after { content: ''; flex: 1; border-top: 1px solid var(--border); }

  .fixture-row {
    display: flex;
    align-items: center;
    padding: 7px 0;
    font-size: 13px;
    border-bottom: 1px solid var(--surface2);
    gap: 8px;
  }
  .fixture-row:last-child { border-bottom: none; }
  .fixture-home { flex: 1; text-align: right; }
  .fixture-away { flex: 1; }
  .fixture-score {
    min-width: 64px;
    text-align: center;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    font-size: 14px;
  }
  .fixture-score.upcoming { color: var(--muted); font-size: 11px; font-weight: 400; letter-spacing: 0.05em; }
  .fixture-row.player-fixture .fixture-home,
  .fixture-row.player-fixture .fixture-away { font-weight: 600; }
  .fixture-row.played { opacity: 0.75; }
  .result-w { color: var(--green); }
  .result-d { color: var(--amber); }
  .result-l { color: var(--red); }

  /* ── Squad Table ── */
  .squad-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 2px;
    font-size: 13px;
  }
  .squad-table th {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .squad-table th:hover { color: var(--text); }
  .squad-table th.num { text-align: right; }
  .squad-table th.sorted { color: var(--gold); }
  .squad-table td {
    padding: 9px 10px;
    font-variant-numeric: tabular-nums;
  }
  .squad-table td.num { text-align: right; }
  .squad-table tr.top-scorer td { color: var(--gold); }
  .squad-table tr.top-scorer td .player-name { color: var(--gold); font-weight: 600; }
  .pos-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 2px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    background: var(--surface3);
    color: var(--text-dim);
  }
  .pos-gk  { background: #1a2a3a; color: #5ab0e0; }
  .pos-def { background: #1a2a1a; color: #5acf7a; }
  .pos-mid { background: #2a1a1a; color: #e0a050; }
  .pos-fwd { background: #2a1a2a; color: #d06090; }
  .rating-bar {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .rating-bar-track {
    width: 40px;
    height: 4px;
    background: var(--surface3);
    border-radius: 2px;
    overflow: hidden;
  }
  .rating-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--gold);
  }
  .swap-handle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 3px;
    font-size: 14px;
    color: var(--muted);
    cursor: grab;
    user-select: none;
    transition: color 0.15s, background 0.15s;
  }
  .swap-handle:hover { color: var(--text); background: var(--surface3); }
  .swap-handle:active { cursor: grabbing; }
  .squad-table tr.drag-source { opacity: 0.35; }
  .squad-table tr.drag-over td { background: color-mix(in srgb, var(--gold) 10%, transparent); }
  .squad-table tr.drag-over { outline: 1px solid var(--gold-dim); }
  .squad-table tr.starter td { border-top: 1px solid color-mix(in srgb,var(--green) 35%,transparent); border-bottom: 1px solid color-mix(in srgb,var(--green) 35%,transparent); }
  .squad-table tr.starter td:first-child { border-left: 1px solid color-mix(in srgb,var(--green) 35%,transparent); border-radius: 5px 0 0 5px; }
  .squad-table tr.starter td:last-child  { border-right: 1px solid color-mix(in srgb,var(--green) 35%,transparent); border-radius: 0 5px 5px 0; }
  .squad-table tr.starter:hover td { background: color-mix(in srgb,var(--green) 12%,var(--surface2)); }
  .squad-table tr.rotation td { border-top: 1px solid color-mix(in srgb,var(--red) 35%,transparent); border-bottom: 1px solid color-mix(in srgb,var(--red) 35%,transparent); }
  .squad-table tr.rotation td:first-child { border-left: 1px solid color-mix(in srgb,var(--red) 35%,transparent); border-radius: 5px 0 0 5px; }
  .squad-table tr.rotation td:last-child  { border-right: 1px solid color-mix(in srgb,var(--red) 35%,transparent); border-radius: 0 5px 5px 0; }
  .squad-table tr.rotation:hover td { background: color-mix(in srgb,var(--red) 12%,var(--surface2)); }
  .squad-table tr.swap-target { cursor: pointer; }
  .squad-table tr.swap-target td { background: color-mix(in srgb, var(--gold) 7%, transparent); }
  .squad-table tr.swap-target:hover td { background: color-mix(in srgb, var(--gold) 16%, transparent); }
  .squad-table tr.swap-inactive { opacity: 0.3; pointer-events: none; }
  .swap-handle.swap-active { background: var(--surface3); }

  .status-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 2px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .status-starter { background: var(--green-dim); color: var(--green); }
  .status-rotation { background: var(--surface3); color: var(--text-dim); }
  .team-rating-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 16px;
    margin-bottom: 16px;
    font-size: 13px;
  }
  .team-rating-value {
    font-family: var(--font-display);
    font-size: 28px;
    color: var(--gold);
    line-height: 1;
  }

  /* ══════════════════════════════════════════
     PRE-MATCH
  ══════════════════════════════════════════ */
  .prematch-screen {
    max-width: 640px;
    margin: 0 auto;
    padding: 40px 24px;
    width: 100%;
  }
  .prematch-header {
    text-align: center;
    margin-bottom: 32px;
  }
  .prematch-header .matchday-label {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .prematch-teams {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }
  .prematch-team { text-align: center; }
  .prematch-team-name {
    font-family: var(--font-display);
    font-size: 26px;
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .prematch-team-name.player { color: var(--gold); }
  .prematch-vs {
    font-family: var(--font-display);
    font-size: 32px;
    color: var(--muted);
  }
  .prematch-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 2px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .tag-home { background: var(--green-dim); color: var(--green); }
  .tag-away { background: var(--surface3); color: var(--text-dim); }
  .tag-strong { background: var(--red-dim); color: var(--red); }
  .tag-mid { background: var(--surface3); color: var(--text-dim); }
  .tag-weak { background: var(--green-dim); color: var(--green); }

  .form-dots {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin-top: 6px;
  }
  .form-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .form-dot.W { background: var(--green); }
  .form-dot.D { background: var(--amber); }
  .form-dot.L { background: var(--red); }
  .form-dot.empty { background: var(--surface3); }

  .prematch-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }
  .prematch-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 16px;
    text-align: center;
  }
  .prematch-stat-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .prematch-stat-value {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }

  /* ══════════════════════════════════════════
     MATCH / QUESTION SCREEN
  ══════════════════════════════════════════ */
  .match-layout {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 0;
    min-height: 100vh;
  }
  .match-left {
    padding: 28px 28px 28px 28px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .match-right {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: var(--surface);
  }

  .match-progress {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .match-progress-pip {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--surface3);
    transition: background 0.2s;
  }
  .match-progress-pip.done { background: var(--gold-dim); }
  .match-progress-pip.current { background: var(--gold); }

  .timer-bar-wrap {
    margin-bottom: 20px;
  }
  .timer-bar-track {
    height: 3px;
    background: var(--surface3);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .timer-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--gold);
    transition: width 1s linear, background 0.3s;
    position: absolute;
    left: 0;
    top: 0;
  }
  .timer-bar-fill.warning { background: var(--amber); }
  .timer-bar-fill.danger { background: var(--red); }
  .timer-label {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }

  .diff-badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 2px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .diff-easy { background: var(--green-dim); color: var(--green); }
  .diff-medium { background: #1a2a1a; color: #d4c047; }
  .diff-hard { background: var(--red-dim); color: var(--red); }
  .diff-elite { background: var(--purple-dim); color: var(--purple); }

  .question-text {
    font-size: 18px;
    font-weight: 500;
    line-height: 1.45;
    margin-bottom: 24px;
    color: var(--text);
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
  }
  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.4;
    transition: border-color 0.15s, background 0.15s;
  }
  .option-btn:hover { border-color: var(--gold-dim); background: var(--surface2); }
  .option-btn.selected { border-color: var(--gold); background: var(--surface2); }
  .option-btn.correct { border-color: var(--green); background: var(--green-dim); color: var(--green); }
  .option-btn.wrong { border-color: var(--red); background: var(--red-dim); color: var(--red); }
  .option-btn.missed { border-color: var(--green-dim); background: var(--green-dim); }
  .option-btn:disabled { cursor: default; }
  .option-key {
    font-family: var(--font-display);
    font-size: 16px;
    color: var(--muted);
    min-width: 20px;
    line-height: 1.4;
    flex-shrink: 0;
  }
  .option-btn.selected .option-key { color: var(--gold); }
  .option-check {
    width: 16px;
    height: 16px;
    border: 1px solid var(--border);
    border-radius: 2px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
  }
  .option-btn.selected .option-check { border-color: var(--gold); background: var(--gold); color: #000; }

  .reveal-panel {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text-dim);
  }
  .reveal-result {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .reveal-result.correct { color: var(--green); }
  .reveal-result.wrong { color: var(--red); }
  .reveal-explanation { margin-top: 4px; color: var(--text-dim); font-size: 13px; line-height: 1.55; }
  .tier-shift-notice { margin-top: 10px; padding: 6px 10px; border-radius: 3px; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
  .tier-shift-notice.promoted { background: rgba(74,232,122,0.1); color: var(--green); border: 1px solid var(--green-dim); }
  .tier-shift-notice.demoted  { background: rgba(224,82,82,0.1);  color: var(--red);   border: 1px solid var(--red-dim); }
  .diff-shift-arrow { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-left: 6px; vertical-align: middle; }
  .diff-shift-arrow.shift-up   { color: var(--green); }
  .diff-shift-arrow.shift-down { color: var(--red); }

  @keyframes score-vibrate {
    0%,100% { transform: translateX(0) scale(1); }
    20%     { transform: translateX(-5px) scale(1.18); }
    40%     { transform: translateX(5px) scale(1.18); }
    60%     { transform: translateX(-3px) scale(1.1); }
    80%     { transform: translateX(3px) scale(1.05); }
  }
  .score-vibrate { display: inline-block; animation: score-vibrate 0.5s ease; }

  .inline-score-panel {
    text-align: center;
    padding: 14px 0 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 18px;
  }
  .inline-score-digits {
    font-family: var(--font-display);
    font-size: 60px;
    line-height: 1;
    letter-spacing: 0.04em;
  }
  .inline-score-clubs {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
    margin-top: 5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .inline-narrative {
    margin-top: 10px;
    font-style: italic;
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.5;
  }

  /* Match right panel */
  .scoreline-panel {
    text-align: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
  }
  .scoreline-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .scoreline-score {
    font-family: var(--font-display);
    font-size: 52px;
    line-height: 1;
    letter-spacing: 0.04em;
  }
  .scoreline-clubs {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  .mini-table {
    font-size: 12px;
  }
  .mini-table-head {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .mini-table-row {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 0;
    border-bottom: 1px solid var(--surface2);
    font-variant-numeric: tabular-nums;
  }
  .mini-table-row:last-child { border-bottom: none; }
  .mini-table-pos { color: var(--muted); width: 18px; font-size: 11px; }
  .mini-table-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mini-table-pts { color: var(--text-dim); width: 24px; text-align: right; }
  .mini-table-row.player-row { color: var(--gold); }
  .mini-table-sep {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    padding: 2px 0;
    letter-spacing: 0.1em;
  }

  /* ══════════════════════════════════════════
     MATCH REPORT
  ══════════════════════════════════════════ */
  .report-screen {
    max-width: 580px;
    margin: 0 auto;
    padding: 40px 24px;
    width: 100%;
  }
  .report-scoreline {
    text-align: center;
    margin-bottom: 8px;
  }
  .report-score {
    font-family: var(--font-display);
    font-size: 88px;
    line-height: 0.95;
    letter-spacing: 0.04em;
  }
  .report-clubs {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
    padding: 0 8px;
  }
  .result-badge {
    display: block;
    padding: 4px 16px;
    border-radius: 2px;
    font-family: var(--font-display);
    font-size: 20px;
    letter-spacing: 0.12em;
    margin: 12px auto 24px;
    text-align: center;
  }
  .result-badge.win { background: var(--green-dim); color: var(--green); }
  .result-badge.draw { background: var(--amber-dim); color: var(--amber); }
  .result-badge.loss { background: var(--red-dim); color: var(--red); }

  .scorers-block { margin-bottom: 20px; }
  .scorer-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    font-size: 13px;
    border-bottom: 1px solid var(--surface2);
  }
  .scorer-row:last-child { border-bottom: none; }
  .scorer-min { color: var(--muted); font-variant-numeric: tabular-nums; min-width: 32px; font-size: 12px; }
  .scorer-name { flex: 1; }
  .scorer-team { font-size: 11px; color: var(--muted); }

  .flavour-text {
    font-style: italic;
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.6;
    border-left: 2px solid var(--gold-dim);
    padding-left: 12px;
    margin-bottom: 24px;
  }
  .kit-bar {
    display: inline-flex;
    width: 14px;
    height: 14px;
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
    vertical-align: middle;
    margin-right: 6px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .session-stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
  .session-stat { display: flex; flex-direction: column; gap: 2px; min-width: 80px; }
  .session-stat-value { font-family: var(--font-display); font-size: 24px; line-height: 1; color: var(--text); }
  .session-stat-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .mastered-list { border-top: 1px solid var(--border); padding-top: 10px; margin-top: 4px; }
  .mastered-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .mastered-item { font-size: 12px; color: var(--green); padding: 2px 0; }
  .dual-progress-panel {
    display: flex; align-items: center; gap: 24px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 14px 20px; margin-bottom: 20px;
  }
  .progress-sport { display: flex; flex-direction: column; gap: 4px; min-width: 120px; }
  .progress-sport-pos { font-family: var(--font-display); font-size: 32px; color: var(--gold); line-height: 1; }
  .progress-sport-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .progress-sport-form { display: flex; gap: 4px; margin-top: 4px; }
  .progress-divider { width: 1px; background: var(--border); align-self: stretch; }
  .progress-learn { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .progress-learn-bar { height: 6px; border-radius: 3px; background: var(--surface3); overflow: hidden; display: flex; }
  .plb-mastered { background: var(--green); height: 100%; transition: width 0.4s ease; }
  .plb-learning  { background: var(--amber); height: 100%; transition: width 0.4s ease; }
  .progress-learn-label { font-size: 12px; color: var(--text-dim); }
  .progress-learn-weak  { font-size: 11px; color: var(--red); }

  /* ══════════════════════════════════════════
     END OF SEASON
  ══════════════════════════════════════════ */
  .eos-screen {
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 24px;
    width: 100%;
  }
  .eos-header {
    text-align: center;
    margin-bottom: 32px;
  }
  .eos-title {
    font-family: var(--font-display);
    font-size: 48px;
    color: var(--gold);
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .eos-subtitle {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .result-message {
    text-align: center;
    padding: 20px;
    border-radius: 4px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
  }
  .result-message.promotion { border-color: var(--green); background: var(--green-dim); }
  .result-message.relegation { border-color: var(--red); background: var(--red-dim); }
  .result-message.safe { border-color: var(--border); }
  .result-message-title {
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .result-message.promotion .result-message-title { color: var(--green); }
  .result-message.relegation .result-message-title { color: var(--red); }
  .result-message-sub { font-size: 13px; color: var(--text-dim); }

  .awards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  .award-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px;
  }
  .award-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 6px;
  }
  .award-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .award-detail { font-size: 12px; color: var(--text-dim); }

  .transfers-list { margin-bottom: 28px; }
  .transfer-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 4px;
    margin-bottom: 8px;
    font-size: 13px;
    opacity: 0;
    transform: translateX(-8px);
    animation: slideIn 0.3s ease forwards;
  }
  .transfer-card.incoming { border: 1px solid var(--green-dim); background: rgba(62,207,106,0.06); }
  .transfer-card.outgoing { border: 1px solid var(--red-dim); background: rgba(224,82,82,0.06); }
  .transfer-arrow { font-size: 16px; }
  .transfer-card.incoming .transfer-arrow { color: var(--green); }
  .transfer-card.outgoing .transfer-arrow { color: var(--red); }
  .transfer-info { flex: 1; }
  .transfer-name { font-weight: 600; }
  .transfer-detail { font-size: 11px; color: var(--text-dim); }
  .transfer-rating {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--gold);
  }

  @keyframes slideIn {
    to { opacity: 1; transform: translateX(0); }
  }

  /* ══════════════════════════════════════════
     UTILITY
  ══════════════════════════════════════════ */
  .screen { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .flex { display: flex; }
  .flex-col { flex-direction: column; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .gap-8 { gap: 8px; }
  .gap-12 { gap: 12px; }
  .gap-16 { gap: 16px; }
  .mb-4 { margin-bottom: 4px; }
  .mb-8 { margin-bottom: 8px; }
  .mb-12 { margin-bottom: 12px; }
  .mb-16 { margin-bottom: 16px; }
  .mb-24 { margin-bottom: 24px; }
  .mb-32 { margin-bottom: 32px; }
  .mt-auto { margin-top: auto; }

  @media (max-width: 640px) {
    .match-layout { grid-template-columns: 1fr; }
    .match-right { border-right: none; border-top: 1px solid var(--border); order: -1; }
    .prematch-teams { grid-template-columns: 1fr auto 1fr; gap: 8px; }
    .prematch-team-name { font-size: 18px; }
    .awards-grid { grid-template-columns: 1fr; }
    .start-header h1 { font-size: 72px; }
    .hub-tabs { overflow-x: auto; gap: 0; }
    .hub-tab { flex-shrink: 0; font-size: 11px; padding: 8px 12px; }
    .hub-footer { flex-wrap: wrap; gap: 8px; }
    .league-table th:nth-child(n+4):nth-child(-n+8),
    .league-table td:nth-child(n+4):nth-child(-n+8) { display: none; }
  }
</style>
</head>

<div id="app"></div>
<script>
// ══════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════
const KIT_COLOURS = [
  { name: 'Royal Blue',  hex: '#1a4fba' },
  { name: 'Crimson',     hex: '#b81a1a' },
  { name: 'Forest',      hex: '#1a6b30' },
  { name: 'Amber',       hex: '#d4821a' },
  { name: 'Violet',      hex: '#6b1ab8' },
  { name: 'Teal',        hex: '#1a8a7a' },
  { name: 'Slate',       hex: '#4a5a6b' },
  { name: 'Claret',      hex: '#7a1a3a' },
];

// ══════════════════════════════════════════
// QUESTION BANK — ANIMAL FACTS (57 questions)
// ══════════════════════════════════════════
const QUESTIONS = [
  // ── EASY ──────────────────────────────────────────────────────────────
  {
    id: 'ANI-EA-001', difficulty: 'easy',
    question: 'Is a bat a mammal?',
    options: ['Yes', 'No'],
    answers: [0],
    explanation: 'Bats are the only mammals capable of sustained flight. They give birth to live young and nurse them with milk.'
  },
  {
    id: 'ANI-EA-002', difficulty: 'easy',
    question: 'Which of these animals are cold-blooded? (Select all that apply)',
    options: ['Crocodile', 'Snake', 'Penguin', 'Lizard'],
    answers: [0, 1, 3],
    explanation: 'Crocodiles, snakes, and lizards are all reptiles and cold-blooded (ectothermic). Penguins are birds — warm-blooded.'
  },
  {
    id: 'ANI-EA-003', difficulty: 'easy',
    question: 'What is the largest land animal on Earth?',
    options: ['Hippopotamus', 'African elephant', 'White rhinoceros'],
    answers: [1],
    explanation: 'The African elephant is the largest land animal, with bulls reaching up to 6,000 kg and 3.3 m at the shoulder.'
  },
  {
    id: 'ANI-EA-004', difficulty: 'easy',
    question: 'How many legs does a spider have?',
    options: ['Six', 'Eight', 'Ten', 'Twelve'],
    answers: [1],
    explanation: 'Spiders have eight legs. Six-legged animals are insects. Spiders are arachnids — a different class entirely.'
  },
  {
    id: 'ANI-EA-005', difficulty: 'easy',
    question: 'Which animals are nocturnal? (Select all that apply)',
    options: ['Owl', 'Eagle', 'Bat', 'Hedgehog', 'Rabbit'],
    answers: [0, 2, 3],
    explanation: 'Owls, bats, and hedgehogs are nocturnal. Eagles are diurnal (active by day). Rabbits are crepuscular — most active at dawn and dusk.'
  },
  {
    id: 'ANI-EA-006', difficulty: 'easy',
    question: 'Do all birds fly?',
    options: ['Yes', 'No'],
    answers: [1],
    explanation: 'No. Penguins, ostriches, emus, kiwis, and cassowaries are all birds that cannot fly. Penguins instead \'fly\' through water.'
  },
  {
    id: 'ANI-EA-007', difficulty: 'easy',
    question: 'What is a group of lions called?',
    options: ['Pack', 'Herd', 'Pride', 'Flock'],
    answers: [2],
    explanation: 'A group of lions is called a pride. A pack is used for wolves; a herd for cattle or elephants; a flock for birds.'
  },
  {
    id: 'ANI-EA-008', difficulty: 'easy',
    question: 'Which of these are true fish? (Select all that apply)',
    options: ['Shark', 'Dolphin', 'Salmon', 'Whale', 'Tuna'],
    answers: [0, 2, 4],
    explanation: 'Sharks, salmon, and tuna are true fish. Dolphins and whales are marine mammals — they breathe air, give birth to live young, and nurse them.'
  },
  {
    id: 'ANI-EA-009', difficulty: 'easy',
    question: 'What is the fastest land animal?',
    options: ['Lion', 'Cheetah', 'Pronghorn antelope', 'Greyhound'],
    answers: [1],
    explanation: 'The cheetah is the fastest land animal, reaching 112 km/h in short sprints. The pronghorn is the fastest over long distances.'
  },
  {
    id: 'ANI-EA-010', difficulty: 'easy',
    question: 'Which animals have a backbone? (Select all that apply)',
    options: ['Dog', 'Octopus', 'Eagle', 'Earthworm', 'Salmon', 'Frog'],
    answers: [0, 2, 4, 5],
    explanation: 'Dogs, eagles, salmon, and frogs are all vertebrates. Octopuses and earthworms are invertebrates — they have no backbone.'
  },
  {
    id: 'ANI-EA-011', difficulty: 'easy',
    question: 'Do sharks have bones?',
    options: ['Yes', 'No'],
    answers: [1],
    explanation: 'Sharks are cartilaginous fish — their skeletons are made of cartilage, not bone. This makes them lighter and more flexible.'
  },
  {
    id: 'ANI-EA-012', difficulty: 'easy',
    question: 'Which of these animals are marsupials? (Select all that apply)',

// ── MODULE REGISTRY (v1.22-style) ──────────────────────────────────────────
// Converts flat question arrays (each item has a "difficulty" field) into the
// tiered module format so that built-in sets and uploaded modules share one
// identical code path.  This is what fixes the website compatibility issue.

function flatToTiers(flatArr) {
  const tiers = { easy: [], medium: [], hard: [], elite: [] };
  flatArr.forEach(q => {
    const t = q.difficulty;
    if (tiers[t]) tiers[t].push(q);
  });
  return tiers;
}

function countTierQs(mod) {
  return ['easy','medium','hard','elite'].reduce((n,t) => n + (mod.tiers[t]||[]).length, 0);
}

function validateModule(obj) {
  if (!obj || typeof obj !== 'object') return 'Not a valid JSON object.';
  if (!obj.name) return 'Missing required field: "name".';
  if (!obj.tiers || typeof obj.tiers !== 'object') return 'Missing required field: "tiers".';
  for (const tier of ['easy','medium','hard','elite']) {
    const qs = obj.tiers[tier];
    if (!qs) continue;
    if (!Array.isArray(qs)) return `"tiers.${tier}" must be an array.`;
    for (let i = 0; i < qs.length; i++) {
      const q = qs[i];
      if (!q.question) return `tiers.${tier}[${i}]: missing "question".`;
      if (!Array.isArray(q.options) || q.options.length < 2) return `tiers.${tier}[${i}]: "options" needs ≥2 items.`;
      const answers = q.answers || (typeof q.answer === 'number' ? [q.answer] : null);
      if (!answers || !answers.length) return `tiers.${tier}[${i}]: "answers" must be a non-empty array of indices.`;
    }
  }
  if (countTierQs(obj) < 1) return 'Module must have at least 1 question.';
  return null;
}

let availableModules = [];

function registerModule(obj, tag) {
  const modId = tag === 'builtin' ? (obj.id || 'builtin-' + Date.now()) : 'mod_' + Date.now();
  const normTiers = {};
  for (const t of ['easy','medium','hard','elite']) {
    normTiers[t] = (obj.tiers[t] || []).map(q => {
      const normed = (q.answers) ? q : { ...q, answers: (typeof q.answer === 'number' ? [q.answer] : []) };
      return normed;
    });
  }
  availableModules.push({
    id: modId, name: obj.name, icon: obj.icon || '', description: obj.description || '',
    tiers: normTiers, tag,
    total: countTierQs({ tiers: normTiers }),
  });
  return modId;
}

function loadBuiltinModules() {
  registerModule({
    id: 'animals', name: 'Animal Kingdom', icon: '🦁',
    description: 'Wildlife, biology and animal behaviour.',
    tiers: flatToTiers(QUESTIONS),
  }, 'builtin');
  registerModule({
    id: 'economics', name: 'Basic Economics', icon: '📈',
    description: 'Markets, policy, trade and financial literacy.',
    tiers: flatToTiers(QUESTIONS_ECO),
  }, 'builtin');
}

// Kept for backward-compat references in renderStartScreen / renderInfoTab
const QUESTION_SETS = {
  // Proxy object: .find() / .map() are re-routed to availableModules after loadBuiltinModules()
  find(fn) { return availableModules.find(fn); },
  map(fn)  { return availableModules.map(fn);  },
};

function getActiveQuestions() {
  const setId = (state && state.questionSet) || 'animals';
  const mod = availableModules.find(m => m.id === setId) || availableModules[0];
  return mod
    ? ['easy','medium','hard','elite'].flatMap(t => mod.tiers[t] || [])
    : [...QUESTIONS];
}

function effectiveDifficulty(qid, baseDiff) {
  const tiers = ['easy', 'medium', 'hard', 'elite'];
  const baseIndex = tiers.indexOf(baseDiff);
  if (baseIndex === -1) return baseDiff;
  const score = (qState?._qScores?.[qid]) || 0;
  const shift = score >= 6 ? 2 : score >= 3 ? 1 : score <= -6 ? -2 : score <= -3 ? -1 : 0;
  return tiers[clamp(baseIndex + shift, 0, 3)];
}

function diffShiftInfo(qid, baseDiff) {
  const eff = effectiveDifficulty(qid, baseDiff);
  if (eff === baseDiff) return { shifted: false, direction: null, eff };
  const tiers = ['easy', 'medium', 'hard', 'elite'];
  return { shifted: true, direction: tiers.indexOf(eff) > tiers.indexOf(baseDiff) ? 'up' : 'down', eff };
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function randInt(lo, hi) { return Math.floor(Math.random() * (hi - lo + 1)) + lo; }
function divName(n) { return n === 1 ? 'Prima Divisione' : 'Seconda Divisione'; }
function relegationCount(total) { return total <= 8 ? 1 : total <= 14 ? 2 : 3; }
function posColour(pos, total, div) {
  const rel = relegationCount(total);
  if (pos > total - rel) return 'var(--red)';
  if (div === 2) { return pos <= rel ? 'var(--green)' : null; }
  if (pos === 1) return 'var(--gold)';
  const clEnd   = total <= 8 ? 2 : total <= 14 ? 3 : 4;
  const euroEnd = total <= 8 ? 3 : total <= 14 ? 5 : 6;
  if (pos <= clEnd)   return 'var(--purple)';
  if (pos <= euroEnd) return '#5ab0e0';
  return null;
}
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function deepCopy(obj) { return JSON.parse(JSON.stringify(obj)); }

// Safe localStorage wrappers — fall back silently when storage is blocked
// (e.g. cross-origin iframes, sandboxed environments, private browsing)
const _store = (() => {
  let _mem = {};
  let _hasLS = null;
  function _check() {
    if (_hasLS !== null) return _hasLS;
    try { localStorage.setItem('_t','1'); localStorage.removeItem('_t'); _hasLS = true; }
    catch(e) { _hasLS = false; }
    return _hasLS;
  }
  return {
    setItem(k, v) { try { if (_check()) localStorage.setItem(k, v); else _mem[k] = v; } catch(e) { _mem[k] = v; } },
    getItem(k)    { try { if (_check()) return localStorage.getItem(k); return _mem[k] ?? null; } catch(e) { return _mem[k] ?? null; } },
    removeItem(k) { try { if (_check()) localStorage.removeItem(k); else delete _mem[k]; } catch(e) { delete _mem[k]; } },
  };
})();

function saveState() {
  const qs = deepCopy(qState);
  const uploadedMods = availableModules.filter(m => m.tag === 'uploaded');
  _store.setItem('anstoss_state',     JSON.stringify(state));
  _store.setItem('anstoss_questions', JSON.stringify(qs));

  _store.setItem('anstoss_modules',   JSON.stringify(uploadedMods));
}

function loadSavedState() {
  try {
    const raw = _store.getItem('anstoss_state');
    if (!raw) return false;
    state  = JSON.parse(raw);
    if (!state.matchdays) {
      const tc = state.teamCount || 18;
      state.matchdays = state.returnFixtures !== false ? (tc - 1) * 2 : tc - 1;
    }
    if (!state.tactic) state.tactic = 'moderate';
    if (!state.questionSet) state.questionSet = 'animals';
    const qs = JSON.parse(_store.getItem('anstoss_questions') || '{}');
    qState = {

    };
    career = JSON.parse(_store.getItem('anstoss_career') || 'null') || freshCareer();

    const savedMods = JSON.parse(_store.getItem('anstoss_modules') || '[]');
    savedMods.forEach(m => {

let _nextPlayerId = 1;
function uniqueName(localNames) {
  const existing = new Set([
    ...(localNames || []),
    ...(state && state.squad ? state.squad.map(p => p.name) : []),
  ]);
  let name, attempts = 0;
  do { name = randomName(); attempts++; } while (existing.has(name) && attempts < 100);
  return name;
}

function newPlayer(position, minRating, maxRating, localNames) {
  const rating = randInt(minRating, maxRating);
  const age    = randInt(17, 32);
  const name   = uniqueName(localNames);
  return {
    id:               _nextPlayerId++,
    name,
    position,
    rating,
    age,
    goalsThisSeason:  0,
    goalsCareer:      0,
    status:              'Rotation',
    careerBoostGiven:    false,
    improvementPoints:   0,
    ratingChangeThisSeason: 0,
  };
}

// Formation 1-4-3-3: 1 GK, 4 DEF, 3 MID, 3 FWD starters
const STARTERS_PER_POS = { GK: 1, DEF: 4, MID: 3, FWD: 3 };

function generateSquad() {
  _nextPlayerId = 1;
  const players = [];
  const localNames = []; // track names during generation before state.squad exists
  const addPlayer = (pos, min, max) => {
    const p = newPlayer(pos, min, max, localNames);
    localNames.push(p.name);
    players.push(p);
  };
  for (let i = 0; i < 2; i++) addPlayer('GK',  52, 60);
  for (let i = 0; i < 8; i++) addPlayer('DEF', 50, 62);
  for (let i = 0; i < 6; i++) addPlayer('MID', 48, 64);
  for (let i = 0; i < 6; i++) addPlayer('FWD', 50, 65);
  assignStatuses(players);
  return players;
}

function assignStatuses(squad) {
  const positions = ['GK','DEF','MID','FWD'];
  positions.forEach(pos => {
    const inPos = [...squad.filter(p => p.position === pos)]
      .sort((a, b) => b.rating - a.rating);
    const starterCount = STARTERS_PER_POS[pos] || 0;
    inPos.forEach((p, i) => { p.status = i < starterCount ? 'Starter' : 'Rotation'; });
  });
}

function calcTeamRating(squad) {
  const sq = squad || (state && state.squad) || [];
  const starters = sq.filter(p => p.status === 'Starter');
  const pool = starters.length === 11 ? starters : [...sq].sort((a,b) => b.rating - a.rating).slice(0, 11);
  if (!pool.length) return 0;
  return Math.round(pool.reduce((s, p) => s + p.rating, 0) / pool.length);
}

function makeTableRow(club) {
  return {

  };
}

let _extraClubCounter = 0;
function sizedClubList(baseClubs, count, fillRatingMin, fillRatingMax) {
  const sorted = [...baseClubs].sort((a, b) => b.rating - a.rating);
  const result = sorted.slice(0, Math.min(count, sorted.length));
  while (result.length < count) {
    result.push({
      id: 'gen_' + (++_extraClubCounter),
      name: randomClubName(),
      rating: randInt(fillRatingMin, fillRatingMax),
    });
  }
  return result;
}

function buildInitialTable(playerClub, division, teamCount) {
  const tc = teamCount || 18;
  const playerRow = makeTableRow(playerClub);
  if (division === 1) {
    const npcs = sizedClubList(DIV1_CLUBS_BASE, tc - 1, 47, 58);
    const rows = npcs.map(makeTableRow);
    rows.push(playerRow);
    return { div1: rows, div2: sizedClubList(DIV2_CLUBS_BASE, tc, 42, 55).map(makeTableRow) };
  } else {
    const npcs = sizedClubList(DIV2_CLUBS_BASE, tc - 1, 42, 55);
    const rows = npcs.map(makeTableRow);
    rows.push(playerRow);
    return { div1: sizedClubList(DIV1_CLUBS_BASE, tc, 47, 58).map(makeTableRow), div2: rows };
  }
}

/* Round-robin rotation algorithm */
function generateFixtures(clubs, returnFixtures) {
  const n   = clubs.length;
  const fix = clubs[0];
  const rot = clubs.slice(1);

  const firstLeg = [];
  for (let round = 0; round < n - 1; round++) {
    const circle  = [fix, ...rot];
    const matches = [];
    for (let i = 0; i < n / 2; i++) {
      const a = circle[i];
      const b = circle[n - 1 - i];
      const [home, away] = (round % 2 === 0) ? [a, b] : [b, a];
      matches.push({ homeId: home.id, awayId: away.id, played: false, hg: null, ag: null });
    }
    firstLeg.push({ matches });
    rot.unshift(rot.pop());
  }

  let all;
  if (returnFixtures !== false) {
    const secondLeg = firstLeg.map(rd => ({
      matches: rd.matches.map(m => ({
        homeId: m.awayId, awayId: m.homeId, played: false, hg: null, ag: null,
      })),
    }));
    all = shuffle([...firstLeg, ...secondLeg]);
  } else {
    all = shuffle([...firstLeg]);
  }
  return all.map((md, i) => ({ matchdayNum: i + 1, ...md }));
}

function generateAllFixtures() {
  const rf = state.returnFixtures !== false;
  const div1Clubs = state.table.div1.map(r => ({ id: r.id, name: r.name }));
  const div2Clubs = state.table.div2.map(r => ({ id: r.id, name: r.name }));
  state.fixtures = {
    div1: generateFixtures(div1Clubs, rf),
    div2: generateFixtures(div2Clubs, rf),
  };
}

/* Table helpers */
function sortTable(rows) {
  return [...rows].sort((a, b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    const gdA = a.gf - a.ga, gdB = b.gf - b.ga;
    if (gdB !== gdA) return gdB - gdA;
    return b.gf - a.gf;
  });
}

function getTableRow(id, divNum) {
  const key = `div${divNum || state.division}`;
  return (state.table[key] || []).find(r => r.id === id) || null;
}

function updateTableRow(row, scored, conceded) {
  row.pld++;
  row.gf += scored;
  row.ga += conceded;
  if (scored > conceded)      { row.w++; row.pts += 3; row.form.push('W'); }
  else if (scored === conceded){ row.d++; row.pts += 1; row.form.push('D'); }
  else                         { row.l++;               row.form.push('L'); }
  if (row.form.length > 5) row.form.shift();
}

/* NPC match simulation */
function simulateNPCMatch(homeRow, awayRow) {
  const conv = clamp(0.50 + (homeRow.rating + 3 - awayRow.rating) / 100, 0.15, 0.90);
  const n    = Math.abs(homeRow.rating - awayRow.rating) >= 10 ? 4 : 3;
  let hg = 0, ag = 0;
  for (let i = 0; i < n; i++) { if (Math.random() < conv)       hg++; }
  for (let i = 0; i < n; i++) { if (Math.random() < 1 - conv)   ag++; }
  return { hg, ag };
}

function simulateAndRecord(match, divNum) {
  const homeRow = getTableRow(match.homeId, divNum);
  const awayRow = getTableRow(match.awayId, divNum);
  if (!homeRow || !awayRow) return;
  const { hg, ag } = simulateNPCMatch(homeRow, awayRow);
  updateTableRow(homeRow, hg, ag);
  updateTableRow(awayRow, ag, hg);
  match.played = true;
  match.hg = hg;
  match.ag = ag;
}

/* Simulate all NPC matches for a given matchday index (0-based) */
function simulateMatchday(matchdayIdx) {
  const d = state.division;
  const o = d === 1 ? 2 : 1;

  // Player's division: skip player's own match
  const md1 = state.fixtures[`div${d}`]?.[matchdayIdx];
  if (md1) {
    md1.matches.forEach(m => {
      if (m.homeId === 'player' || m.awayId === 'player' || m.played) return;
      simulateAndRecord(m, d);
    });
  }

  // Other division: simulate everything
  const md2 = state.fixtures[`div${o}`]?.[matchdayIdx];
  if (md2) {
    md2.matches.forEach(m => { if (!m.played) simulateAndRecord(m, o); });
  }
}

/* Find the player's match for the current matchday */
function getPlayerMatch() {
  const idx = state.matchday - 1;
  const md  = state.fixtures?.[`div${state.division}`]?.[idx];
  if (!md) return null;
  return md.matches.find(m => m.homeId === 'player' || m.awayId === 'player') || null;
}

function getClubName(id) {
  if (id === 'player') return state.club.name;
  const tableRow = [...(state?.table?.div1 || []), ...(state?.table?.div2 || [])].find(r => r.id === id);
  if (tableRow) return tableRow.name;
  return DIV1_CLUBS_BASE.find(c => c.id === id)?.name
      || DIV2_CLUBS_BASE.find(c => c.id === id)?.name
      || id;
}

function formDotsHtml(form) {
  const dots = Array(Math.max(0, 5 - form.length)).fill(null).concat(form);
  return dots.map(d => `<span class="form-dot ${d || 'empty'}"></span>`).join('');
}

function calcPopularity() {
  const div    = state.division;
  const sorted = sortTable(state.table[`div${div}`]);
  const total  = sorted.length;
  if (!total) return 50;
  const rel = relegationCount(total);
  const pos = sorted.findIndex(r => r.id === 'player') + 1;
  if (pos === 0) return 50;

  // 1/3: absolute position (1st=100, last=0)
  const posScore = total > 1 ? (total - pos) / (total - 1) * 100 : 100;

  // 1/3: vs expected position based on rating
  const sortedByRating = [...sorted].sort((a, b) => b.rating - a.rating);
  const expectedPos    = sortedByRating.findIndex(r => r.id === 'player') + 1;
  const firstSafePos   = total - rel;
  const goalPos        = Math.min(expectedPos, firstSafePos);
  const perfScore      = pos === 1 ? 100 : clamp(70 + (goalPos - pos) * 10, 0, 100);

  // 1/3: form (last 5 games, W=20 D=10 L=0)
  const formScore = state.form.slice(-5).reduce((s, r) => s + (r === 'W' ? 20 : r === 'D' ? 10 : 0), 0);

  return Math.round((posScore + perfScore + formScore) / 3);
}

function popularityColour(p) {

  return 'var(--red)';
}

      const isP     = m.homeId === 'player' || m.awayId === 'player';
      const hName   = getClubName(m.homeId);
      const aName   = getClubName(m.awayId);
      let scoreHtml;
      if (m.played) {
        let cls = '';
        if (isP) {
          const pg = m.homeId === 'player' ? m.hg : m.ag;
          const og = m.homeId === 'player' ? m.ag : m.hg;
          cls = pg > og ? 'result-w' : pg < og ? 'result-l' : 'result-d';
        }
        scoreHtml = `<span class="fixture-score ${cls}">${m.hg} – ${m.ag}</span>`;
      } else {
        scoreHtml = `<span class="fixture-score upcoming">${isPast?'—':'vs'}</span>`;
      }
      html += `<div class="fixture-row${m.played?' played':''}${isP?' player-fixture':''}">
        <div class="fixture-home">${hName}${kitBarHtml(m.homeId)}</div>
        ${scoreHtml}
        <div class="fixture-away">${kitBarHtml(m.awayId)}${aName}</div>
      </div>`;
    });
    return html + '</div>';
  }).join('');
}

/* ── Squad tab ── */
function renderSquadTab() {
  const avg    = calcTeamRating(state.squad);
  const maxGs  = Math.max(0, ...state.squad.map(p => p.goalsThisSeason));
  const topId  = maxGs > 0 ? state.squad.find(p => p.goalsThisSeason === maxGs)?.id : null;
  const cols   = [
    { key:'name',          label:'Name',   num:false },
    { key:'position',      label:'Pos',    num:false },
    { key:'rating',        label:'Rating', num:true  },
    { key:'age',           label:'Age',    num:true  },
    { key:'goalsThisSeason', label:'Gls',  num:true  },
    { key:'goalsCareer',     label:'Career',num:true  },
    { key:'status',          label:'Status',num:false },
  ];
  const sq = [...state.squad].sort((a, b) => {
    const av = a[squadSort.col], bv = b[squadSort.col];
    const primary = typeof av === 'string'
      ? squadSort.dir * av.localeCompare(bv)
      : squadSort.dir * (bv - av);
    const POS_ORDER = { GK: 0, DEF: 1, MID: 2, FWD: 3 };
    const posDiff = (POS_ORDER[a.position] ?? 4) - (POS_ORDER[b.position] ?? 4);
    return primary !== 0 ? primary : posDiff !== 0 ? posDiff : b.rating - a.rating;
  });
  const rBar = p => {
    const chg = p.ratingChangeThisSeason || 0;
    const chgHtml = chg !== 0
      ? `<span style="font-size:10px;font-weight:700;color:${chg > 0 ? 'var(--green)' : 'var(--red)'};margin-right:5px;letter-spacing:0">${chg > 0 ? '↑' : '↓'}${Math.abs(chg)}</span>`
      : '';
    return `<span style="display:inline-flex;align-items:center">${chgHtml}<span>${p.rating}</span></span>`;
  };
  const posBadge = p => `<span class="pos-badge pos-${p.toLowerCase()}">${p}</span>`;
  const sBadge   = s => {
    const c = s === 'Starter' ? 'status-starter' : 'status-rotation';
    return `<span class="status-badge ${c}">${s}</span>`;
  };
  const hasSwapTarget  = p => state.squad.some(s => s.position === p.position && s.status !== p.status);
  const swapSrc        = _squadSwapSrcId != null ? state.squad.find(p => p.id === _squadSwapSrcId) : null;
  const isValidTarget  = p => swapSrc && p.id !== swapSrc.id && p.position === swapSrc.position && p.status !== swapSrc.status;
  const swapHandle = p => {
    if (p.id === _squadSwapSrcId) {
      return `<span class="swap-handle swap-active" onclick="squadSwapClick(${p.id})" title="Cancel">` +
        `<span style="color:var(--green);font-size:11px;line-height:1">↑</span>` +
        `<span style="color:var(--red);font-size:11px;line-height:1">↓</span></span>`;
    }
    if (hasSwapTarget(p)) {
      return `<span class="swap-handle" draggable="true"
        title="Click to select, or drag to swap"
        onclick="squadSwapClick(${p.id})"
        ondragstart="squadDragStart(event,${p.id})"
        ondragend="squadDragEnd(event)">⇅</span>`;
    }
    return `<span style="display:inline-block;width:26px"></span>`;
  };
  const tactic = state.tactic || 'moderate';
  const tacticDesc = tactic === 'offensive' ? 'More questions per match, higher risk/reward'
                   : tactic === 'defensive' ? 'Fewer questions per match, lower risk/reward'
                   : 'Standard question count';
  return `
    <div class="card card-tight mb-16">
      <div class="section-label" style="margin-bottom:8px">Tactic</div>
      <div style="display:flex;gap:6px;margin-bottom:6px">
        ${['offensive','moderate','defensive'].map(t => `
          <button class="btn btn-sm ${tactic===t?'btn-primary':'btn-secondary'}"
            style="flex:1;text-transform:capitalize" onclick="setTactic('${t}')">${t}</button>
        `).join('')}
      </div>
      <div style="font-size:11px;color:var(--text-dim)">${tacticDesc}</div>
    </div>
    <div class="team-rating-bar">
      <span class="text-dim" style="font-size:12px">Squad avg rating (starters)</span>
      <span class="team-rating-value">${avg}</span>
    </div>
    <table class="squad-table">
      <thead><tr>
        ${cols.map(c=>`<th class="${c.num?'num':''} ${squadSort.col===c.key?'sorted':''}"
          onclick="sortSquadBy('${c.key}')">
          ${c.label}${squadSort.col===c.key?(squadSort.dir===-1?' ↓':' ↑'):''}
        </th>`).join('')}
        <th></th>
      </tr></thead>
      <tbody>
        ${sq.map(p=>{
          const swapTargetRow = isValidTarget(p);
          const swapInactiveRow = _squadSwapSrcId != null && !swapTargetRow && p.id !== _squadSwapSrcId;
          const rc = [p.id===topId?'top-scorer':'', p.status==='Starter'?'starter':'rotation', swapTargetRow?'swap-target':'', swapInactiveRow?'swap-inactive':''].filter(Boolean).join(' ');
          return `<tr class="${rc}"
          ondragover="squadDragOver(event,${p.id})"
          ondragleave="squadDragLeave(event)"
          ondrop="squadDragDrop(event,${p.id})">
          <td class="${p.id===topId?'player-name':''}">${p.name}</td>
          <td>${posBadge(p.position)}</td>
          <td class="num">${rBar(p)}</td>
          <td class="num">${p.age}</td>
          <td class="num">${p.goalsThisSeason}</td>
          <td class="num">${p.goalsCareer}</td>
          <td>${sBadge(p.status)}</td>
          <td style="width:32px;text-align:center;padding:0">${swapHandle(p)}</td>
        </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

function setTactic(t) {
  state.tactic = t;
  saveState();
  renderHub('squad');
}

function doSwap(pid1, pid2) {
  const p1 = state.squad.find(s => s.id === pid1);
  const p2 = state.squad.find(s => s.id === pid2);
  if (!p1 || !p2) return;
  [p1.status, p2.status] = [p2.status, p1.status];
  state.club.rating = calcTeamRating(state.squad);
  const plRow = getTableRow('player');
  if (plRow) plRow.rating = state.club.rating;
  saveState();
  renderHub('squad');
}

let _squadDragSrcId = null;
let _squadSwapSrcId = null;

function squadSwapClick(id) {
  if (_squadSwapSrcId === null) {
    _squadSwapSrcId = id;
    renderHub('squad');
  } else if (_squadSwapSrcId === id) {
    _squadSwapSrcId = null;
    renderHub('squad');
  } else {
    const srcId = _squadSwapSrcId;
    _squadSwapSrcId = null;
    doSwap(srcId, id);
  }
}

function squadDragStart(e, id) {
  _squadDragSrcId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.closest('tr').classList.add('drag-source');
}

function squadDragEnd(e) {
  _squadDragSrcId = null;
  document.querySelectorAll('.squad-table tr').forEach(r =>
    r.classList.remove('drag-source', 'drag-over'));
}

function squadDragOver(e, id) {
  if (_squadDragSrcId === null || _squadDragSrcId === id) return;
  const src = state.squad.find(p => p.id === _squadDragSrcId);
  const tgt = state.squad.find(p => p.id === id);
  if (!src || !tgt || src.position !== tgt.position || src.status === tgt.status) return;
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}

function squadDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function squadDragDrop(e, id) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (_squadDragSrcId === null || _squadDragSrcId === id) return;
  const src = state.squad.find(p => p.id === _squadDragSrcId);
  const tgt = state.squad.find(p => p.id === id);
  _squadDragSrcId = null;
  if (!src || !tgt || src.position !== tgt.position || src.status === tgt.status) return;
  doSwap(src.id, tgt.id);
}

function getRatingLabel(pos, total) {
  const pct = pos / total;
  if (pct <= 0.17) return { label: 'Title Contenders',   cls: 'tag-strong' };
  if (pct <= 0.44) return { label: 'Strong Side',         cls: 'tag-strong' };
  if (pct <= 0.67) return { label: 'Mid-table',           cls: 'tag-mid'    };
  if (pct <= 0.83) return { label: 'Relegation Battle',   cls: 'tag-mid'    };
  return              { label: 'Relegation Zone',         cls: 'tag-weak'   };
}

function getFormScore(form) {
  return form.slice(-5).reduce((s, r) => s + (r === 'W' ? 1 : r === 'L' ? -1 : 0), 0);
}

function getQuestionCount(ratingGap) {
  let base;
  if (ratingGap >= 10) base = 2;
  else if (ratingGap >= 1)  base = 3;
  else if (ratingGap >= 0)  base = 3;
  else if (ratingGap >= -9) base = 4;
  else base = 5;
  const tactic = (state && state.tactic) || 'moderate';
  if (tactic === 'offensive') return Math.max(2, Math.min(8, Math.round(base * 1.5)));
  if (tactic === 'defensive') return Math.max(1, Math.min(6, Math.round(base * 0.75)));
  return base;
}

function getDifficultyMix(ratingGap, formScore, season) {
  // Base weights [easy, medium, hard, elite]
  let m;
  if (ratingGap >= 10)      m = [60, 30, 10,  0];
  else if (ratingGap >= 1)  m = [30, 40, 25,  5];
  else if (ratingGap >= -9) m = [10, 30, 40, 20];
  else                       m = [ 0, 15, 45, 40];

  // Season drift
  if (season >= 3) {
    m[0] = Math.max(0, m[0] - 20); m[2] += 12; m[3] += 8;
  } else if (season === 2) {
    m[0] = Math.max(0, m[0] - 10); m[1] += 10;
  }

  // Form modifier
  if (formScore >= 4)       m = [0,      m[0],           m[1],           m[2] + m[3]];
  else if (formScore >= 2) { m[0] = Math.max(0,m[0]-10); m[1] = Math.max(0,m[1]-5); m[2]+=10; m[3]+=5; }
  else if (formScore <= -4) m = [m[1],   m[2],           m[3],           0          ];
  else if (formScore <= -2){ m[0]+=10; m[1]+=5; m[2] = Math.max(0,m[2]-10); m[3] = Math.max(0,m[3]-5); }

  const total = m.reduce((s, v) => s + v, 0) || 1;
  return m.map(v => v / total); // normalised fractions [e, m, h, x]
}

function selectQuestions(count, mix) {
  const all      = getActiveQuestions();
  const diffs    = ['easy', 'medium', 'hard', 'elite'];
  const byDiff   = Object.fromEntries(diffs.map(d => [d, all.filter(q => effectiveDifficulty(q.id, q.difficulty) === d)]));
  const usedIds  = new Set();
  const selected = [];

  // Fill remaining via weighted difficulty mix
  const remaining = count - selected.length;
  for (let i = 0; i < remaining; i++) {
    const r   = Math.random();
    let cum   = 0, chosenDiff = 'medium';
    for (let j = 0; j < diffs.length; j++) {
      cum += mix[j];
      if (r < cum) { chosenDiff = diffs[j]; break; }
    }
    const pool = byDiff[chosenDiff].filter(q => !usedIds.has(q.id));
    const src  = pool.length > 0 ? pool : all.filter(q => !usedIds.has(q.id));
    if (!src.length) break;
    const q = src[Math.floor(Math.random() * src.length)];
    selected.push(q); usedIds.add(q.id);
  }

  return shuffle(selected);
}

function renderPreMatch() {
  const pm = getPlayerMatch();
  if (!pm) { renderHub(); return; }

  const isHome  = pm.homeId === 'player';
  const oppId   = isHome ? pm.awayId : pm.homeId;

  const sorted  = sortTable(state.table[`div${state.division}`]);
  const plPos   = sorted.findIndex(r => r.id === 'player') + 1;
  const oppPos  = sorted.findIndex(r => r.id === oppId) + 1;
  const total   = sorted.length;

  const rGap    = state.club.rating - (oppRow?.rating || 60);
  const qCount  = getQuestionCount(rGap);
  const { label: oppLabel, cls: oppCls } = getRatingLabel(oppPos, total);

  const difficulty = rGap >= 10  ? 'Comfortable'
                   : rGap >= 1   ? 'Favourable'
                   : rGap >= -9  ? 'Competitive'
                   : rGap >= -10 ? 'Tough'
                   : 'Very Tough';

  document.getElementById('app').innerHTML = `
    <div class="prematch-screen screen">
      <div class="prematch-header">
        <div class="matchday-label">Season ${state.season} · Matchday ${state.matchday} of ${state.matchdays}</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:4px">${difficulty} fixture · ${qCount} question${qCount>1?'s':''} · <span style="text-transform:capitalize">${state.tactic||'moderate'}</span></div>
      </div>

      <div class="prematch-teams">
        <div class="prematch-team">
          <div class="prematch-team-name player">${kitBarHtml('player')}${state.club.name}</div>
          <div><span class="prematch-tag ${isHome?'tag-home':'tag-away'}">${isHome?'HOME':'AWAY'}</span></div>
          <div style="font-size:12px;color:var(--text-dim);margin-top:4px">${ordinal(plPos)} place · Rtg ${state.club.rating}</div>
          <div class="form-dots" style="justify-content:center;margin-top:6px">${formDotsHtml(state.form)}</div>
        </div>

        <div class="prematch-vs">VS</div>

        <div class="prematch-team">
          <div class="prematch-team-name">${kitBarHtml(oppId)}${getClubName(oppId)}</div>
          <div><span class="prematch-tag ${oppCls}">${oppLabel}</span></div>
          <div style="font-size:12px;color:var(--text-dim);margin-top:4px">${ordinal(oppPos)} place · Rtg ${oppRow?.rating ?? '?'}</div>
          <div class="form-dots" style="justify-content:center;margin-top:6px">${formDotsHtml(oppRow?.form||[])}</div>
        </div>
      </div>

      <div class="prematch-stats">
        <div class="prematch-stat">
          <div class="prematch-stat-label">Your Rating</div>
          <div class="prematch-stat-value text-gold" style="font-family:var(--font-display)">${state.club.rating}</div>
        </div>
        <div class="prematch-stat">
          <div class="prematch-stat-label">Questions</div>
          <div class="prematch-stat-value" style="font-family:var(--font-display)">${qCount}</div>
        </div>
        <div class="prematch-stat">
          <div class="prematch-stat-label">Season Form</div>
          <div class="prematch-stat-value" style="font-size:14px">${plRow ? `${plRow.w}W ${plRow.d}D ${plRow.l}L` : '0W 0D 0L'}</div>
        </div>
        <div class="prematch-stat">
          <div class="prematch-stat-label">Points</div>
          <div class="prematch-stat-value" style="font-family:var(--font-display)">${plRow?.pts ?? 0}</div>
        </div>
      </div>

      <div style="display:flex;gap:12px;justify-content:center">
        <button class="btn btn-ghost" onclick="renderHub()">← Hub</button>
        <button class="btn btn-primary btn-lg" onclick="startMatch()">Kick Off</button>
      </div>
    </div>
  `;
}

function startMatch() {
  const pm     = getPlayerMatch();
  if (!pm) { renderHub(); return; }

  const isHome = pm.homeId === 'player';
  const oppId  = isHome ? pm.awayId : pm.homeId;
  const oppRow = getTableRow(oppId);
  const rGap   = state.club.rating - (oppRow?.rating || 60);
  const fScore = getFormScore(state.form);
  const mix    = getDifficultyMix(rGap, fScore, state.season);
  const count  = getQuestionCount(rGap);
  const qs     = selectQuestions(count, mix);

  const sortedBefore = sortTable(state.table[`div${state.division}`]);
  state.currentMatch = {
    opponentId:       oppId,
    isHome,
    questions:        qs,
    currentQIdx:      0,
    playerGoals:      0,
    oppGoals:         0,
    goalScorers:      [],
    phase:            'answering',
    selectedOptions:  [],
    lastAnswerCorrect: null,
    rotationEligible: false,
    positionBefore:   sortedBefore.findIndex(r => r.id === 'player') + 1,
    tierChanges:      [],
  };

  saveState();
  renderMatch(); // full implementation in Step 9
}
