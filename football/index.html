let timerLeft  = 30;

function renderMiniTableHtml() {
  const sorted = sortTable(state.table[`div${state.division}`]);
  const total  = sorted.length;
  const plPos  = sorted.findIndex(r => r.id === 'player');
  const row = (r, pos) => `
    <div class="mini-table-row ${r.id==='player'?'player-row':''}">
      <span class="mini-table-pos">${pos}</span>
      ${kitBarHtml(r.id)}<span class="mini-table-name">${r.name.split(' ').slice(-1)[0]}</span>
      <span class="mini-table-pts">${r.pts}</span>
    </div>`;
  let html = '';
  for (let i = 0; i < Math.min(5, total); i++) html += row(sorted[i], i+1);
  const rel = relegationCount(total);
  if (plPos >= 5 && plPos < total - rel) {
    html += `<div class="mini-table-sep">···</div>${row(sorted[plPos], plPos+1)}`;
  }
  if (total > 8) html += `<div class="mini-table-sep">···</div>`;
  for (let i = Math.max(5, total - rel); i < total; i++) html += row(sorted[i], i+1);
  return html;
}

function renderMatch() {
  const cm = state.currentMatch;
  if (!cm) { renderHub(); return; }

  const q = cm.questions[cm.currentQIdx];
  if (!q) { clearMatchTimer(); finaliseMatch(); return; }

  if (cm.phase === 'answering') {
    clearMatchTimer();
    timerLeft  = 30;
    matchTimer = setInterval(tickTimer, 1000);
  }

  const isMulti = q.answers.length > 1;
  const diffMap = { easy:'diff-easy', medium:'diff-medium', hard:'diff-hard', elite:'diff-elite' };
  const pips    = cm.questions.map((_, i) => `<div class="match-progress-pip ${i<cm.currentQIdx?'done':i===cm.currentQIdx?'current':''}"></div>`).join('');

  const optionsHtml = q.options.map((opt, i) => {
    let cls = '';
    if (cm.phase === 'revealed') {
      const isAns = q.answers.includes(i), wasSel = cm.selectedOptions.includes(i);
      cls = isAns && wasSel ? 'correct' : !isAns && wasSel ? 'wrong' : isAns ? 'missed' : '';
    } else {
      cls = cm.selectedOptions.includes(i) ? 'selected' : '';
    }
    const indicator = isMulti
      ? `<span class="option-check">${cm.selectedOptions.includes(i)?'✓':''}</span>`
      : `<span class="option-key">${i+1}</span>`;
    return `<button class="option-btn ${cls}" onclick="toggleOption(${i})" ${cm.phase==='revealed'?'disabled':''}>
      ${indicator}<span>${opt}</span>
    </button>`;
  }).join('');

  const revealHtml = cm.phase === 'revealed' ? (() => {
    const newScore = qState._qScores?.[q.id] || 0;
    const justPromoted = cm.lastAnswerCorrect && (newScore === 3 || newScore === 6);
    const justDemoted  = !cm.lastAnswerCorrect && (newScore === -3 || newScore === -6);
    const eff = effectiveDifficulty(q.id, q.difficulty);
    return `<div class="reveal-panel">
      <div class="reveal-result ${cm.lastAnswerCorrect?'correct':'wrong'}">
        ${cm.lastAnswerCorrect ? '✓ Correct' : '✗ Wrong'}
      </div>
      ${q.explanation ? `<div class="reveal-explanation">${q.explanation}</div>` : ''}
      ${justPromoted ? `<div class="tier-shift-notice promoted">▲ Question promoted to ${eff}</div>` : ''}
      ${justDemoted  ? `<div class="tier-shift-notice demoted">▼ Question demoted to ${eff}</div>` : ''}
    </div>`;
  })() : '';

  const hName  = cm.isHome ? state.club.name : getClubName(cm.opponentId);
  const aName  = cm.isHome ? getClubName(cm.opponentId) : state.club.name;
  const hG     = cm.isHome ? cm.playerGoals : cm.oppGoals;
  const aG     = cm.isHome ? cm.oppGoals    : cm.playerGoals;
  const timerPct = cm.phase === 'revealed' ? 0 : timerLeft / 30 * 100;
  const timerCls = timerLeft <= 10 ? ' danger' : timerLeft <= 20 ? ' warning' : '';

  // Which score digit to animate after a goal
  let hVib = false, aVib = false;
  if (cm.phase === 'revealed' && cm.lastNarrative && cm.lastNarrative.scored) {
    const playerScored = cm.lastNarrative.wasPlayerPhase;
    hVib = playerScored ? cm.isHome : !cm.isHome;
    aVib = playerScored ? !cm.isHome : cm.isHome;
  }
  const playerAhead = cm.playerGoals > cm.oppGoals;
  const oppAhead    = cm.oppGoals > cm.playerGoals;
  const playerScoreCol = playerAhead ? 'var(--green)' : oppAhead ? 'var(--red)' : 'var(--text)';
  const oppScoreCol    = oppAhead    ? 'var(--red)'   : 'var(--text)';
  const hCol = cm.isHome ? playerScoreCol : oppScoreCol;
  const aCol = cm.isHome ? oppScoreCol    : playerScoreCol;

  const narrativeHtml = cm.phase === 'revealed' && cm.lastNarrative
    ? `<div class="inline-narrative">${buildNarrative(cm.lastNarrative)}</div>`
    : '';

  const hScorers = cm.goalScorers.filter(g => cm.isHome ? g.isPlayer : !g.isPlayer);
  const aScorers = cm.goalScorers.filter(g => cm.isHome ? !g.isPlayer : g.isPlayer);
  const scorerEntry = g => `<div style="font-size:11px;color:var(--text-dim);line-height:1.6">${g.name} <span style="color:var(--muted)">${g.minute}'</span></div>`;
  const scorersHtml = (hScorers.length || aScorers.length) ? `
    <div style="display:flex;gap:8px;margin-top:8px;width:100%">
      <div style="flex:1;text-align:left">${hScorers.map(scorerEntry).join('')}</div>
      <div style="flex:1;text-align:right">${aScorers.map(scorerEntry).join('')}</div>
    </div>` : '';

  const inlineScore = `
    <div class="inline-score-panel">
      <div class="inline-score-digits">
        <span class="${hVib?'score-vibrate':''}" style="color:${hCol}">${hG}</span>
        <span style="color:var(--muted)"> – </span>
        <span class="${aVib?'score-vibrate':''}" style="color:${aCol}">${aG}</span>
      </div>
      <div class="inline-score-clubs">
        <span>${hName.split(' ').slice(-1)[0]}</span>
        <span>${aName.split(' ').slice(-1)[0]}</span>
      </div>
      ${scorersHtml}
      ${narrativeHtml}
    </div>`;

  document.getElementById('app').innerHTML = `
    <div class="match-layout screen">
      <div class="match-left">
        <div class="match-progress">${pips}</div>

        <div class="timer-bar-wrap">
          <div class="timer-bar-track">
            <div id="tbf" class="timer-bar-fill${timerCls}" style="width:${timerPct}%"></div>
          </div>
          <div class="timer-label" id="tlbl">${cm.phase==='revealed'?'—':timerLeft+'s'}</div>
        </div>

        ${inlineScore}

        ${(() => { const si = diffShiftInfo(q.id, q.difficulty); return `<span class="diff-badge ${diffMap[si.eff]||'diff-medium'}">${si.eff}</span>${si.shifted ? `<span class="diff-shift-arrow shift-${si.direction}">${si.direction==='up'?'▲':'▼'} ${q.difficulty}</span>` : ''}`; })()}
        <div class="question-text">${q.question}</div>
        ${isMulti?`<div style="font-size:11px;color:var(--muted);margin-bottom:12px;letter-spacing:.08em">SELECT ALL THAT APPLY</div>`:''}

        <div class="options-list">${optionsHtml}</div>
        ${revealHtml}

        ${cm.phase === 'answering'
          ? `<button id="lock-btn" class="btn btn-primary btn-full" onclick="lockIn()" ${cm.selectedOptions.length===0?'disabled':''}>Lock In</button>`
          : `<button class="btn btn-primary btn-full" onclick="nextQuestion()">${cm.currentQIdx<cm.questions.length-1?'Next Question →':'See Result →'}</button>`
        }
      </div>

      <div class="match-right">
        <div class="scoreline-panel">
          <div class="scoreline-label">Q ${cm.currentQIdx+1} of ${cm.questions.length}</div>
          <div class="scoreline-score">
            <span style="color:${hCol}">${hG}</span>
            <span style="color:var(--muted)"> – </span>
            <span style="color:${aCol}">${aG}</span>
          </div>
          <div class="scoreline-clubs">
            <span>${hName.split(' ').slice(-1)[0]}</span>
            <span>${aName.split(' ').slice(-1)[0]}</span>
          </div>
        </div>
        <div class="mini-table">
          <div class="mini-table-head">${divName(state.division)}</div>
          ${renderMiniTableHtml()}
        </div>
      </div>
    </div>`;

  document.removeEventListener('keydown', handleMatchKey);
  document.addEventListener('keydown', handleMatchKey);
}

function clearMatchTimer() {
  if (matchTimer) { clearInterval(matchTimer); matchTimer = null; }
}

function tickTimer() {
  timerLeft = Math.max(0, timerLeft - 1);
  const fill = document.getElementById('tbf');
  const lbl  = document.getElementById('tlbl');
  if (fill) { fill.style.width = (timerLeft/30*100)+'%'; fill.className='timer-bar-fill'+(timerLeft<=10?' danger':timerLeft<=20?' warning':''); }
  if (lbl)  lbl.textContent = timerLeft+'s';
  if (timerLeft <= 0) { clearMatchTimer(); lockIn(); }
}

function toggleOption(idx) {
  const cm = state.currentMatch;
  if (!cm || cm.phase !== 'answering') return;
  const q = cm.questions[cm.currentQIdx];
  if (q.answers.length === 1) {
    cm.selectedOptions = [idx];
  } else {
    const pos = cm.selectedOptions.indexOf(idx);
    pos >= 0 ? cm.selectedOptions.splice(pos,1) : cm.selectedOptions.push(idx);
  }
  // Lightweight DOM update — no full re-render
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    const sel = cm.selectedOptions.includes(i);
    btn.classList.toggle('selected', sel);
    const key = btn.querySelector('.option-key');
    if (key) key.style.color = sel ? 'var(--gold)' : '';
    const chk = btn.querySelector('.option-check');
    if (chk) chk.textContent = sel ? '✓' : '';
  });
  const lb = document.getElementById('lock-btn');
  if (lb) lb.disabled = cm.selectedOptions.length === 0;
}

function isCorrectAnswer(q, sel) {
  const s = [...sel].sort((a,b)=>a-b);
  const a = [...q.answers].sort((a,b)=>a-b);
  return s.length === a.length && s.every((v,i) => v === a[i]);
}

function pickMinute(cm) {
  const n   = cm.questions.length || 1;
  const idx = cm.currentQIdx;
  const seg = 90 / n;
  const lo  = Math.round(idx * seg) + 1;
  const hi  = Math.round((idx + 1) * seg);
  const used = new Set(cm.goalScorers.map(g => g.minute));
  let m, tries = 0;
  do { m = randInt(lo, hi); tries++; } while (used.has(m) && tries < 20);
  if (used.has(m)) {
    tries = 0;
    do { m = randInt(1, 90); tries++; } while (used.has(m) && tries < 100);
  }
  return m;
}


function pickScorerByPosition(cm) {
  const earlyPhase = cm.currentQIdx < Math.ceil(cm.questions.length * 0.6);
  if (!earlyPhase) cm.rotationEligible = true;
  // Position roll: 70% FWD, 20% MID, 10% DEF
  const posRoll = Math.random();
  const posPriority = posRoll < 0.70 ? ['FWD','MID','DEF'] :
                      posRoll < 0.90 ? ['MID','FWD','DEF'] : ['DEF','MID','FWD'];

  for (const pos of posPriority) {
    const eligible = state.squad.filter(p =>
      p.position === pos &&
      p.position !== 'GK' &&
      (p.status === 'Starter' || !earlyPhase)
    );
    if (!eligible.length) continue;
    const base  = eligible.map(p => Math.max(0, p.rating - 45));
    const total = base.reduce((s, w) => s + w, 0);
    if (total === 0) return eligible[0];
    let r = Math.random() * total;
    for (let i = 0; i < eligible.length; i++) { r -= base[i]; if (r <= 0) return eligible[i]; }
    return eligible[eligible.length - 1];
  }
  // Fallback: any non-GK
  return state.squad.find(p => p.position !== 'GK') || state.squad[0];
}

function resolveQuestion(correct, cm) {
  const oppRow = getTableRow(cm.opponentId);
  const pEff   = state.club.rating + (cm.isHome ? 3 : 0);
  const oEff   = (oppRow?.rating || 60) + (cm.isHome ? 0 : 3);
  const conv   = clamp(0.50 + (pEff - oEff) / 100, 0.15, 0.90);

  let candidateName, scored, wasPlayerPhase;

  if (correct) {
    wasPlayerPhase = true;
    const cand = pickScorerByPosition(cm);
    candidateName = cand.name.split(' ').pop();
    scored = Math.random() < conv;
    if (scored) {
      cand.goalsThisSeason++;
      cand.goalsCareer++;
      cm.playerGoals++;
      cm.goalScorers.push({ name: cand.name, minute: pickMinute(cm), isPlayer: true });
    }
  } else {
    wasPlayerPhase = false;
    const oppCandName = randomName();
    candidateName = oppCandName.split(' ').pop();
    scored = Math.random() < (1 - conv);
    if (scored) {
      cm.oppGoals++;
      cm.goalScorers.push({ name: oppCandName, minute: pickMinute(cm), isPlayer: false });
    }
  }

  cm.lastNarrative = { playerName: candidateName, scored, wasPlayerPhase };
}

function buildNarrative(n) {
  if (!n) return '';
  const { playerName: name, scored, wasPlayerPhase } = n;
  let pool;
  if (wasPlayerPhase && scored) {
    pool = [
      `${name} slots it home after a slick one-two.`,
      `${name} powers a header into the top corner.`,
      `${name} cuts inside and curls one past the keeper.`,
      `${name} converts the rebound after a parried shot.`,
      `${name} finishes coolly from the penalty spot.`,
      `${name} latches onto a through ball and taps in.`,
    ];
  } else if (wasPlayerPhase && !scored) {
    pool = [
      `${name}'s effort is pushed wide by the goalkeeper.`,
      `${name} blazes it over from a good position.`,
      `${name} hits the post — so close.`,
      `${name}'s shot is straight at the keeper.`,
      `${name} pulls it wide under pressure.`,
    ];
  } else if (!wasPlayerPhase && scored) {
    pool = [
      `${name} punishes a defensive lapse to make it count.`,
      `${name} latches onto a loose ball and finishes.`,
      `${name} converts from close range — no chance.`,
    ];
  } else {
    pool = [
      `${name}'s long-range effort drifts wide.`,
      `${name} skies it — a let off.`,
      `${name} is denied by a fine save.`,
    ];
  }
  return pool[Math.floor(Math.random() * pool.length)];
}

function updateQState(q, correct) {
  if (!qState._qScores) qState._qScores = {};
  const prevScore = qState._qScores[q.id] || 0;
  qState._qScores[q.id] = Math.max(-6, Math.min(6, prevScore + (correct ? 1 : -1)));
}

function lockIn() {
  const cm = state.currentMatch;
  if (!cm || cm.phase === 'revealed') return;
  clearMatchTimer();
  const q       = cm.questions[cm.currentQIdx];
  const correct = isCorrectAnswer(q, cm.selectedOptions);
  cm.phase             = 'revealed';
  cm.lastAnswerCorrect = correct;
  const effBefore = effectiveDifficulty(q.id, q.difficulty);
  updateQState(q, correct);
  const effAfter = effectiveDifficulty(q.id, q.difficulty);
  if (effBefore !== effAfter) {
    cm.tierChanges = cm.tierChanges || [];
    cm.tierChanges.push({ baseDiff: q.difficulty, from: effBefore, to: effAfter });
  }
  resolveQuestion(correct, cm);
  saveState();
  renderMatch();
}

function nextQuestion() {
  const cm = state.currentMatch;
  cm.currentQIdx++;
  if (cm.currentQIdx >= cm.questions.length) {
    clearMatchTimer();
    document.removeEventListener('keydown', handleMatchKey);
    finaliseMatch();
    return;
  }
  cm.phase           = 'answering';
  cm.selectedOptions = [];
  cm.lastAnswerCorrect = null;
  timerLeft = 30;
  renderMatch();
}

function handleMatchKey(e) {
  const cm = state.currentMatch;
  if (!cm) return;
  const q = cm.questions[cm.currentQIdx];
  if (cm.phase === 'answering') {
    if (['1','2','3','4'].includes(e.key) && q?.answers.length === 1) {
      const idx = parseInt(e.key) - 1;
      if (idx < q.options.length) { e.preventDefault(); toggleOption(idx); }
    }
    if (e.key === 'Enter' && cm.selectedOptions.length > 0) { e.preventDefault(); lockIn(); }
  } else if (cm.phase === 'revealed') {
    if (e.key === 'Enter') { e.preventDefault(); nextQuestion(); }
  }
}

function kitBarHtml(clubId) {
  if (clubId === 'player') {
    const col = state.club.kitColour || '#888';
    return `<span class="kit-bar"><span style="background:${col};flex:1;height:100%"></span></span>`;
  }
  const club = DIV1_CLUBS_BASE.find(c => c.id === clubId) || DIV2_CLUBS_BASE.find(c => c.id === clubId);
  if (!club?.colours?.length) return '';
  const segs = club.colours.map(c => `<span style="background:${c};flex:1;height:100%"></span>`).join('');
  return `<span class="kit-bar">${segs}</span>`;
}

function pickFlavour(result, pg, og, isHome, ctx) {
  ctx = ctx || {};
  const { scorers = [], playerPos = 0, matchday = 0, totalMatchdays = 38,
          season = 1, opponentName = '', clubName = '' } = ctx;
  const margin = Math.abs(pg - og);
  const sorted = sortTable(state.table[`div${state.division}`]);
  const total  = sorted.length;
  const rel    = relegationCount(total);
  const inDrop = playerPos > total - rel;
  const atTop  = playerPos === 1;
  const recentForm = state.form.slice(-5);
  const losses = recentForm.filter(r => r === 'L').length;
  const wins   = recentForm.filter(r => r === 'W').length;
  const gamesLeft = totalMatchdays - matchday;
  const isRunIn = gamesLeft <= 5 && gamesLeft > 0;
  const isLastGame = matchday === totalMatchdays;
  const isEarly = matchday <= 4;
  const slump = losses >= 3;
  const surge = wins >= 4;

  const lastName = name => (name || '').split(' ').slice(-1)[0];
  const topScorer = scorers.filter(s => s.isPlayer).sort((a,b) =>
    scorers.filter(x => x.name === b.name).length - scorers.filter(x => x.name === a.name).length
  )[0];
  const scorerRef = topScorer ? lastName(topScorer.name) : null;
  const posRef = atTop ? 'top of the table' : inDrop ? 'the drop zone' : `${ordinal(playerPos)}`;

  const pick = arr => arr[Math.floor(Math.random() * arr.length)];

  if (isLastGame) {
    const base = scorerRef
      ? `The last game of the season. ${scorerRef}'s ${result === 'W' ? 'goal' : 'contribution'} — the final word.`
      : `The last game of the season. The curtain comes down.`;
    return base;
  }

  if (result === 'W') {
    const lines = [
      scorerRef && `${scorerRef} with the decisive contribution. ${atTop ? 'Clear at the top.' : `Up to ${posRef}.`}`,
      scorerRef && pg >= 2 && `${scorerRef} among the scorers. ${margin >= 2 ? 'A convincing result.' : 'Job done.'}`,
      isEarly && `The right start to the campaign. ${atTop ? 'Top of the table.' : `${ordinal(playerPos)} place.`}`,
      isRunIn && `Three points with ${gamesLeft} games left. ${atTop ? 'In control.' : 'Keeps the pressure on.'}`,
      surge && `${wins} wins from the last five. This side has found something.`,
      !isHome && `Three points away from home. ${inDrop ? 'Breathing room.' : `Up to ${posRef}.`}`,
      margin >= 3 && `A commanding performance. ${scorerRef ? `${scorerRef} the standout.` : `${atTop ? 'Top of the table.' : ''}`}`,
      atTop && `${atTop ? 'Three points clear at the top.' : `${ordinal(playerPos)} place.`}`,
      `${scorerRef ? `${scorerRef}'s ${pg > 1 ? 'brace was the difference' : 'goal settled it'}.` : 'Three points.'} ${inDrop ? 'Out of the drop zone.' : `Up to ${posRef}.`}`,
      `${isHome ? 'Solid at home.' : 'Resilient away.'} ${pg}-${og} the final score.`,
    ].filter(Boolean);
    return pick(lines);
  }

  if (result === 'D') {
    const lines = [
      scorerRef && `${scorerRef} on the scoresheet, but a point is all that came of it.`,
      isRunIn && `A draw with ${gamesLeft} left. ${inDrop ? 'Not enough.' : 'Every point still counts.'}`,
      slump && `The pressure is building. One point from a possible ${losses+1+' '} is not good enough.`,
      pg === 0 && `${isHome ? 'Held at home.' : 'Goalless away.'} The table tightens.`,
      !isHome && `A point on the road. ${inDrop ? 'Still in the drop zone.' : `Sitting ${posRef}.`}`,
      `${isHome ? 'Shared spoils at home.' : 'A point away from home.'} ${inDrop ? 'Not enough to climb.' : `${ordinal(playerPos)} place.`}`,
      `Neither side could find a winner. ${pg > 0 ? `${pg}-${og}.` : 'Goalless.'}`,
    ].filter(Boolean);
    return pick(lines);
  }

  // Loss
  const lines = [
    scorerRef && !scorers.find(s => !s.isPlayer) && `${scorerRef} scored, but it wasn't enough. Down to ${posRef}.`,
    slump && `${losses} without a win is a run that needs addressing. ${inDrop ? 'Deep in trouble.' : `Down to ${posRef}.`}`,
    isRunIn && `A defeat with ${gamesLeft} games left. ${inDrop ? 'Time is running out.' : 'Costly timing.'}`,
    margin >= 3 && `Taken apart. ${inDrop ? 'Firmly in the drop zone.' : `Down to ${posRef}.`}`,
    !isHome && `No points on the road. ${inDrop ? 'Still in the drop zone.' : `${ordinal(playerPos)} place.`}`,
    isEarly && `A stumble early in the campaign. ${inDrop ? 'Early pressure.' : `${ordinal(playerPos)} after ${matchday}.`}`,
    `${inDrop ? 'Still in the drop zone.' : `Down to ${posRef}.`} ${margin === 1 ? 'A narrow defeat.' : 'Difficult to take.'}`,
    `${opponentName ? lastName(opponentName) : 'The opposition'} took the points. A setback.`,
  ].filter(Boolean);
  return pick(lines);
}

function finaliseMatch() {
  const cm = state.currentMatch;
  if (!cm) { renderHub(); return; }

  const result = cm.playerGoals > cm.oppGoals ? 'W' : cm.playerGoals < cm.oppGoals ? 'L' : 'D';

  // Update player and opponent table rows
  const plRow  = getTableRow('player');
  const oppRow = getTableRow(cm.opponentId);
  if (plRow)  updateTableRow(plRow,  cm.playerGoals, cm.oppGoals);
  if (oppRow) updateTableRow(oppRow, cm.oppGoals,    cm.playerGoals);

  // Update form
  state.form.push(result);
  if (state.form.length > 5) state.form.shift();

  // Mark player's fixture as played
  const mdIdx = state.matchday - 1;
  const md    = state.fixtures?.[`div${state.division}`]?.[mdIdx];
  if (md) {
    const pm = md.matches.find(m => m.homeId === 'player' || m.awayId === 'player');
    if (pm) {
      pm.played = true;
      pm.hg = cm.isHome ? cm.playerGoals : cm.oppGoals;
      pm.ag = cm.isHome ? cm.oppGoals    : cm.playerGoals;
    }
  }

  // Simulate all NPC matches for this matchday
  simulateMatchday(mdIdx);

  // Refresh team rating
  state.club.rating = calcTeamRating(state.squad);

  // Career total goals
  career.totalGoals = (career.totalGoals || 0) + cm.playerGoals;
  if (result === 'W') career.wins   = (career.wins   || 0) + 1;
  else if (result === 'D') career.draws = (career.draws || 0) + 1;
  else career.losses = (career.losses || 0) + 1;

  // Award improvement points
  const cleanSheet = cm.oppGoals === 0;

  // Determine subbed-in rotation players (max 5; rotation scorers auto-included; no GK subs)
  const rotNonGK     = state.squad.filter(p => p.status !== 'Starter' && p.position !== 'GK');
  const rotScorerIds = new Set(
    cm.goalScorers.filter(g => g.isPlayer)
      .map(g => rotNonGK.find(p => p.name === g.name))
      .filter(Boolean).map(p => p.id)
  );
  const extraSubs  = rotNonGK.filter(p => !rotScorerIds.has(p.id))
                       .sort(() => Math.random() - 0.5)
                       .slice(0, Math.max(0, 5 - rotScorerIds.size));
  const playedIds  = new Set([
    ...state.squad.filter(p => p.status === 'Starter').map(p => p.id),
    ...rotNonGK.filter(p => rotScorerIds.has(p.id)).map(p => p.id),
    ...extraSubs.map(p => p.id),
  ]);

  state.squad.forEach(p => {
    if (!p.improvementPoints) p.improvementPoints = 0;
    const played = playedIds.has(p.id);
    if (played) p.improvementPoints += 1;                          // appearance
    if (cleanSheet && played) {
      if (p.position === 'GK')       p.improvementPoints += 4;
      else if (p.position === 'DEF') p.improvementPoints += 3;
      else if (p.position === 'MID') p.improvementPoints += 1;
    }
    if (result === 'W') p.improvementPoints += 1;                  // team win bonus
    if (result === 'L') p.improvementPoints -= 1;                  // team loss penalty
  });

  // Goal IP (5 per goal)
  cm.goalScorers.filter(g => g.isPlayer).forEach(g => {
    const scorer = state.squad.find(p => p.name === g.name);
    if (scorer) scorer.improvementPoints = (scorer.improvementPoints || 0) + 5;
  });

  // Apply upgrades, then apply IP-debt rating loss
  state.squad.forEach(p => {
    applyIPUpgrades(p);
    if (p.improvementPoints < 0) {
      const before = p.rating;
      p.rating = Math.max(40, p.rating - 1);
      p.ratingChangeThisSeason = (p.ratingChangeThisSeason || 0) + (p.rating - before);
      p.improvementPoints = -1;
    }
  });

  state.club.rating = calcTeamRating(state.squad);
  if (plRow) plRow.rating = state.club.rating;

  state.phase = 'matchreport';
  saveState();
  renderMatchReport();
}

function renderMatchReport() {
  const cm = state.currentMatch;
  if (!cm) { renderHub(); return; }

  const result   = cm.playerGoals > cm.oppGoals ? 'W' : cm.playerGoals < cm.oppGoals ? 'L' : 'D';
  const resLabel = result === 'W' ? 'WIN' : result === 'D' ? 'DRAW' : 'LOSS';
  const resCls   = result === 'W' ? 'win' : result === 'D' ? 'draw' : 'loss';

  const hName = cm.isHome ? state.club.name        : getClubName(cm.opponentId);
  const aName = cm.isHome ? getClubName(cm.opponentId) : state.club.name;
  const hG    = cm.isHome ? cm.playerGoals : cm.oppGoals;
  const aG    = cm.isHome ? cm.oppGoals    : cm.playerGoals;

  const rPlayerAhead = cm.playerGoals > cm.oppGoals;
  const rOppAhead    = cm.oppGoals > cm.playerGoals;
  const rPlayerCol = rPlayerAhead ? 'var(--green)' : rOppAhead ? 'var(--red)' : 'var(--text)';
  const rOppCol    = rOppAhead    ? 'var(--red)'   : 'var(--text)';
  const hScoreCol  = cm.isHome ? rPlayerCol : rOppCol;
  const aScoreCol  = cm.isHome ? rOppCol    : rPlayerCol;

  const sorted    = sortTable(state.table[`div${state.division}`]);
  const playerPos = sorted.findIndex(r => r.id === 'player') + 1;
  const flavour   = pickFlavour(result, cm.playerGoals, cm.oppGoals, cm.isHome, {
    scorers: cm.goalScorers, playerPos, matchday: state.matchday,
    totalMatchdays: state.matchdays, season: state.season,
    opponentName: getClubName(cm.opponentId), clubName: state.club.name,
  });

  // Position change indicator
  const posBefore = cm.positionBefore || playerPos;
  const posDiff   = posBefore - playerPos;
  const posIndicator = posDiff > 0
    ? `<span style="color:var(--green);font-size:11px">↑${posDiff}</span>`
    : posDiff < 0
    ? `<span style="color:var(--red);font-size:11px">↓${Math.abs(posDiff)}</span>`
    : `<span style="color:var(--muted);font-size:11px">—</span>`;

  // Tier shift summary
  const tierChanges = cm.tierChanges || [];
  const tierSummaryHtml = (() => {
    if (!tierChanges.length) return '';
    const tiers = ['easy', 'medium', 'hard', 'elite'];
    const groups = {};
    tierChanges.forEach(({ from, to }) => {
      const dir = tiers.indexOf(to) > tiers.indexOf(from) ? 'promoted' : 'demoted';
      const key = `${dir}|${to}`;
      groups[key] = (groups[key] || 0) + 1;
    });
    const lines = Object.entries(groups).map(([key, n]) => {
      const [dir, tier] = key.split('|');
      const arrow = dir === 'promoted' ? '▲' : '▼';
      const col   = dir === 'promoted' ? 'var(--green)' : 'var(--red)';
      return `<span style="color:${col}">${arrow} ${n} ${n === 1 ? 'question' : 'questions'} ${dir} to ${tier}</span>`;
    });
    return `<div class="card card-tight mb-16">
      <div class="section-label">Tier Shifts</div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px;font-size:13px">${lines.join('')}</div>
    </div>`;
  })();

  const scorers = [...cm.goalScorers].sort((a, b) => a.minute - b.minute);
  const scorerHtml = scorers.length
    ? scorers.map(s => `
        <div class="scorer-row">
          <span class="scorer-min tabular">${s.minute}'</span>
          <span class="scorer-name">${s.name}</span>
          <span class="scorer-team" style="color:${s.isPlayer?'var(--gold)':'var(--muted)'}">
            ${s.isPlayer ? state.club.name : getClubName(cm.opponentId)}
          </span>
        </div>`).join('')
    : `<div style="color:var(--muted);font-size:13px;padding:8px 0">No goals scored.</div>`;

  const hKit = cm.isHome ? kitBarHtml('player') : kitBarHtml(cm.opponentId);
  const aKit = cm.isHome ? kitBarHtml(cm.opponentId) : kitBarHtml('player');

  document.getElementById('app').innerHTML = `
    <div class="report-screen screen">
      <div class="report-scoreline">
        <div class="report-score">
          <span style="color:${hScoreCol}">${hG}</span>
          <span style="color:var(--muted);font-size:60px"> – </span>
          <span style="color:${aScoreCol}">${aG}</span>
        </div>
        <div class="report-clubs"><span>${hKit}${hName}</span><span>${aKit}${aName}</span></div>
      </div>

      <div style="text-align:center;margin-bottom:24px">
        <span class="result-badge ${resCls}">${resLabel}</span>
      </div>

      <div class="card card-tight mb-16">
        <div class="section-label">Goalscorers</div>
        <div class="scorers-block" style="margin:0">${scorerHtml}</div>
      </div>

      <div class="flavour-text mb-16">${flavour}</div>

      ${tierSummaryHtml}

      <div class="card card-flush mb-24">
        <div style="padding:8px 16px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)">
          Table — ${ordinal(playerPos)} place ${posIndicator} · Matchday ${state.matchday}
        </div>
        <div class="mini-table" style="padding:8px 16px">
          ${renderMiniTableHtml()}
        </div>
      </div>

      <div style="text-align:right">
        <button class="btn btn-primary" id="continue-btn" onclick="advanceMatchday()">Continue →</button>
      </div>
    </div>`;

  document.removeEventListener('keydown', handleMatchKey);
  document.removeEventListener('keydown', handleReportKey);
  document.addEventListener('keydown', handleReportKey);
}

function handleReportKey(e) {
  if (e.key === 'Enter') { e.preventDefault(); advanceMatchday(); }
}

function advanceMatchday() {
  document.removeEventListener('keydown', handleReportKey);
  state.currentMatch = null;
  state.phase        = 'hub';

  if (state.matchday >= state.matchdays) {
    saveState();
    beginEndOfSeason();
    return;
  }
  state.matchday++;
  saveState();
  renderHub();
}

function ipCost(player) {
  const tierMult = player.rating <= 65 ? 1 : player.rating <= 75 ? 2 : player.rating <= 85 ? 4 : 8;
  const base     = Math.round((player.age * player.age) / 10) * tierMult;
  const scale    = (state && state.matchdays) ? state.matchdays / 38 : 1;
  return Math.max(1, Math.round(base * scale * 0.5));
}

function applyIPUpgrades(player) {
  const before = player.rating;
  let cost = ipCost(player);
  while (player.improvementPoints >= cost && player.rating < 92) {
    player.improvementPoints -= cost;
    player.rating = Math.min(92, player.rating + 1);
    cost = ipCost(player);
  }
  player.ratingChangeThisSeason = (player.ratingChangeThisSeason || 0) + (player.rating - before);
}

function endOfSeasonProgression() {
  const maxGs     = Math.max(0, ...state.squad.map(p => p.goalsThisSeason));
  const topScorer = maxGs > 0 ? state.squad.find(p => p.goalsThisSeason === maxGs) : null;

  state.squad.forEach(p => {
    if (!p.improvementPoints) p.improvementPoints = 0;
    applyIPUpgrades(p);
    // Age decline
    const beforeDecline = p.rating;
    if (p.age >= 35)      p.rating = Math.max(40, p.rating - 3);
    else if (p.age >= 30) p.rating = Math.max(40, p.rating - 1);
    p.ratingChangeThisSeason = (p.ratingChangeThisSeason || 0) + (p.rating - beforeDecline);
    // Age up
    p.age++;
  });

  // Retire players aged 37+, replace with youth
  const retired = state.squad.filter(p => p.age >= 37);
  retired.forEach(p => {
    const idx = state.squad.findIndex(s => s.id === p.id);
    if (idx < 0) return;
    const replacement = newPlayer(p.position, 45, 60);
    replacement.age = 18;
    replacement.improvementPoints = 0;
    replacement.status = 'Rotation';
    state.squad.splice(idx, 1, replacement);
  });

  assignStatuses(state.squad);
  return topScorer;
}


function resolvePromotionRelegation(div1Sorted, div2Sorted) {
  const rel       = relegationCount(Math.max(div1Sorted.length, div2Sorted.length));
  const relegated = div1Sorted.slice(-rel);
  const promoted  = div2Sorted.slice(0, rel);

  relegated.forEach(r => {
    const i = state.table.div1.findIndex(x => x.id === r.id);
    if (i >= 0) state.table.div1.splice(i, 1);
  });
  promoted.forEach(r => {
    const i = state.table.div2.findIndex(x => x.id === r.id);
    if (i >= 0) state.table.div2.splice(i, 1);
    state.table.div1.push(r);
  });
  relegated.forEach(r => state.table.div2.push(r));
}

function driftClubRatings() {
  [...state.table.div1, ...state.table.div2].forEach(r => {
    if (r.id === 'player') return;
    r.rating = clamp(r.rating + randInt(-2, 2), 40, 95);
  });
}

function startNewSeason() {
  [...state.table.div1, ...state.table.div2].forEach(r =>
    Object.assign(r, {pld:0,w:0,d:0,l:0,gf:0,ga:0,pts:0,form:[]})
  );
  state.squad.forEach(p => { p.goalsThisSeason = 0; });
  state.season++;
  state.matchday   = 1;
  state.form       = [];
  state.currentMatch = null;
  state.phase      = 'hub';
  generateAllFixtures();
}

function beginEndOfSeason() {
  // Reset season change indicators before progression — eos changes will set new values
  state.squad.forEach(p => { p.ratingChangeThisSeason = 0; });

  const div1Sorted = sortTable(state.table.div1);
  const div2Sorted = sortTable(state.table.div2);
  const playerDiv  = state.division;

  let finishPos, status = 'safe';
  if (playerDiv === 1) {
    finishPos = div1Sorted.findIndex(r => r.id === 'player') + 1;
    const rel1 = relegationCount(div1Sorted.length);
    if (finishPos > div1Sorted.length - rel1) status = 'relegated';
  } else {
    finishPos = div2Sorted.findIndex(r => r.id === 'player') + 1;
    const rel2 = relegationCount(div2Sorted.length);
    if (finishPos <= rel2) status = 'promoted';
  }

  career.seasonsPlayed++;
  if (playerDiv === 1 && finishPos > 0 &&
      (!career.highestDiv1Finish || finishPos < career.highestDiv1Finish)) {
    career.highestDiv1Finish = finishPos;
  }
  if (playerDiv === 1 && finishPos === 1) {
    career.championships = (career.championships || 0) + 1;
  }
  if (playerDiv === 2 && finishPos > 0 &&
      (!career.highestDiv2Finish || finishPos < career.highestDiv2Finish)) {
    career.highestDiv2Finish = finishPos;
  }

  const topScorer     = endOfSeasonProgression();
  const playerOfSeason = [...state.squad].sort((a,b) => b.rating - a.rating)[0];

  resolvePromotionRelegation(div1Sorted, div2Sorted);
  if (status === 'relegated') state.division = 2;
  if (status === 'promoted')  state.division = 1;

  driftClubRatings();

  const eosData = {
    season: state.season, finishPos, finishDiv: playerDiv, status,
    topScorer, playerOfSeason,
    div1Final: div1Sorted, div2Final: div2Sorted,
  };

  startNewSeason();

  // Refresh player club rating in new-season table
  state.club.rating = calcTeamRating(state.squad);
  const plRow = getTableRow('player');
  if (plRow) plRow.rating = state.club.rating;

  saveState();
  renderEndOfSeason(eosData);
}

  }[d.status];

  const topRows = d.finishDiv === 1 ? d.div1Final.slice(0,5) : d.div2Final.slice(0,5);
  const miniRows = topRows.map((r,i) => `
    <div class="mini-table-row ${r.id==='player'?'player-row':''}">

      <span class="mini-table-pts" style="min-width:32px;text-align:right">${r.pts} pts</span>

  document.getElementById('app').innerHTML = `

        <div class="eos-subtitle">End of Season Report</div>

        <div class="result-message-sub">${statusMsg.body}</div>
      </div>

      <div class="awards-grid mb-24">
        <div class="award-card">
          <div class="award-label">⚽ Top Scorer</div>
          ${d.topScorer
            ? `<div class="award-name">${d.topScorer.name}</div>
               <div class="award-detail">${d.topScorer.goalsThisSeason} goals this season</div>`
            : `<div class="award-detail text-muted">No goals scored</div>`}
        </div>
        <div class="award-card">
          <div class="award-label">★ Player of the Season</div>
          ${d.playerOfSeason
            ? `<div class="award-name">${d.playerOfSeason.name}</div>
               <div class="award-detail">Rating ${d.playerOfSeason.rating} · ${d.playerOfSeason.position}</div>`
            : `<div class="award-detail text-muted">—</div>`}
        </div>
      </div>

      <p class="section-label">Final Table — Top 5</p>
      <div class="card card-flush mb-32">
        <div class="mini-table" style="padding:8px 16px">${miniRows}</div>
      </div>

      <div style="text-align:center">
        <button class="btn btn-primary btn-lg" onclick="renderHub()">Begin Season ${state.season} →</button>
      </div>
    </div>`;
}

function handleTeamCountInput(el) {
  let v = parseInt(el.value) || 18;
  v = Math.max(6, Math.min(20, v));

  selectedTeamCount = v;
  el.value = v;
  const note = document.getElementById('team-count-note');
  if (note) {
    if (wasOdd) { note.style.display = 'block'; note.textContent = `Adjusted to ${v} (must be even)`; }
    else        { note.style.display = 'none'; }
  }
}

  const file = e.target.files?.[0];
  if (!file) return;
  const msg = e.target.closest('.upload-zone').querySelector('.upload-msg');
  msg.style.display = 'block';
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const raw = JSON.parse(ev.target.result);

      // Accept both tiered module format AND legacy flat array format
      let moduleObj = raw;
      if (Array.isArray(raw)) {
        // Legacy flat array: wrap into a module with auto-grouped tiers
        moduleObj = {
          name: file.name.replace(/\.json$/i, '') || 'Custom',
          description: 'Uploaded custom questions',
          tiers: flatToTiers(raw.map((q, i) => {
            if (q.answer !== undefined && !q.answers) q = { ...q, answers: [q.answer] };
            if (!q.id) q = { ...q, id: `custom_${Date.now()}_${i}` };
            if (!q.difficulty || !['easy','medium','hard','elite'].includes(q.difficulty)) q = { ...q, difficulty: 'medium' };
            return q;
          })),
        };
      }

      const err = validateModule(moduleObj);
      if (err) { msg.textContent = `✗ ${err}`; msg.style.color = 'var(--red)'; return; }

      const newModId = registerModule(moduleObj, 'uploaded');
      const total = availableModules.find(m => m.id === newModId)?.total || 0;

      // Auto-select the newly uploaded module
      if (state) {
        state.questionSet = newModId;
        saveState();
        // Re-render the in-hub picker so the new card appears selected
        refreshQsetPicker();
      } else {
        selectedQuestionSet = newModId;
        // Re-render the start screen picker so the new card appears
        refreshQsetPickerStart();
      }

      msg.textContent = `✓ "${moduleObj.name}" loaded · ${total} questions`;
      msg.style.color = 'var(--green)';
    } catch(err) {
      msg.textContent = `✗ Invalid JSON: ${err.message}`;
      msg.style.color = 'var(--red)';
    }
  };
  reader.readAsText(file);
}


// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
function init() {
  loadBuiltinModules(); // register built-in question sets as tiered modules
  if (loadSavedState()) {
    // Resume correct screen based on saved phase
    if (state.phase === 'matchreport' && state.currentMatch) renderMatchReport();
    else if (state.phase === 'match'   && state.currentMatch) { state.currentMatch.phase = 'answering'; state.currentMatch.selectedOptions = []; renderMatch(); }
    else renderHub();
  } else {
    renderStartScreen();
  }
}

init();
</script>
</body>
